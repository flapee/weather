      { id: "pm2_5", label: "PM2.5", color: colors.pm2_5, value: (d) => formatConcentration(d.pm2_5) },
      { id: "dust", label: "Dust", color: colors.dust, value: (d) => formatConcentration(d.dust) },
      { id: "alder_pollen", label: "Alder", color: colors.alder_pollen, value: (d) => formatPollen(d.alder_pollen) },
      { id: "birch_pollen", label: "Birch", color: colors.birch_pollen, value: (d) => formatPollen(d.birch_pollen) },
      { id: "grass_pollen", label: "Grass", color: colors.grass_pollen, value: (d) => formatPollen(d.grass_pollen) },
      { id: "mugwort_pollen", label: "Mugwort", color: colors.mugwort_pollen, value: (d) => formatPollen(d.mugwort_pollen) },
      { id: "olive_pollen", label: "Olive", color: colors.olive_pollen, value: (d) => formatPollen(d.olive_pollen) }
    ];

    const airHistoryColumns = [
      { key: "pm2_5", label: "PM2.5", unit: "μg/m³", color: colors.pm2_5 },
      { key: "dust", label: "Dust", unit: "μg/m³", color: colors.dust },
      { key: "alder_pollen", label: "Alder", unit: "𖡼/m³", color: colors.alder_pollen },
      { key: "birch_pollen", label: "Birch", unit: "𖡼/m³", color: colors.birch_pollen },
      { key: "grass_pollen", label: "Grass", unit: "𖡼/m³", color: colors.grass_pollen },
      { key: "mugwort_pollen", label: "Mugwort", unit: "𖡼/m³", color: colors.mugwort_pollen },
      { key: "olive_pollen", label: "Olive", unit: "𖡼/m³", color: colors.olive_pollen }
    ];

    function dayRowsForVisibility() {
      return forecast.filter((row) => row.h < chartDomainHours());
    }

    function hasFiniteMetric(rows, keys) {
      return rows.some((row) => keys.some((key) => Number.isFinite(row[key])));
    }

    function hasNonzeroMetric(rows, keys) {
      return rows.some((row) => keys.some((key) => Number.isFinite(row[key]) && row[key] > 0));
    }

    function metricHasVisibleData(metric) {
      const rows = dayRowsForVisibility();
      if (!rows.length) return true;
      if (metric.id === "temperature") return hasFiniteMetric(rows, ["actual", "feels"]);
      if (metric.id === "rain") return hasNonzeroMetric(rows, ["pop", "rain"]);
      if (metric.id === "wind") return hasNonzeroMetric(rows, ["wind", "gust"]);
      if (metric.id === "humidity") return hasFiniteMetric(rows, ["humidity"]);
      if (metric.id === "visibility") return hasFiniteMetric(rows, ["visibility"]);
      if (metric.id === "uv") return hasNonzeroMetric(rows, ["uv"]);
      if (isAirQualityMetric(metric.id)) return hasNonzeroMetric(rows, [metric.id]);
      return true;
    }

    function visibleMetricConfigs() {
      return metricConfig.filter((metric) => metric.id !== "uv" && metricHasVisibleData(metric));
    }

    function clearHiddenFocusedMetric() {
      const visibleIds = new Set(visibleMetricConfigs().map((metric) => metric.id));
      if (activeMetric && !visibleIds.has(activeMetric)) activeMetric = null;
      if (hoverMetric && !visibleIds.has(hoverMetric)) hoverMetric = null;
      if (suppressedHoverMetric && !visibleIds.has(suppressedHoverMetric)) suppressedHoverMetric = null;
    }

    function finiteMetricValues(rows, key) {
      return rows.map((row) => row[key]).filter(Number.isFinite);
    }

    function minFiniteValue(rows, key) {
      const values = finiteMetricValues(rows, key);
      return values.length ? Math.min(...values) : null;
    }

    function sumFiniteValues(rows, key) {
      return finiteMetricValues(rows, key).reduce((sum, value) => sum + value, 0);
    }

    function fixedNumber(value, places = 1) {
      return Number.isFinite(value) ? round(value, places).toFixed(places) : "0.0";
    }

    function trendValueParts(value, unit = "") {
      return { value, unit };
    }

    function dailyTrendSummaryParts(metric, rows) {
      if (!rows.length) return trendValueParts("n/a");

      if (metric.id === "temperature") {
        const low = minFiniteValue(rows, "actual");
        const high = maxFiniteValue(rows, "actual");
        return Number.isFinite(low) && Number.isFinite(high) ? trendValueParts(`${round(low)}-${round(high)}`, "&deg;C") : trendValueParts("n/a");
      }

      if (metric.id === "rain") {
        const totalRain = sumFiniteValues(rows, "rain");
        return trendValueParts(fixedNumber(totalRain), "mm");
      }

      if (metric.id === "wind") {
        const windValues = finiteMetricValues(rows, "wind");
        const gustValues = rows.map((row) => Math.max(row.wind, row.gust ?? row.wind)).filter(Number.isFinite);
        if (!windValues.length || !gustValues.length) return trendValueParts("n/a");
        return trendValueParts(`${round(Math.min(...windValues))}-${round(Math.max(...gustValues))}`, windUnitHtml());
      }

      if (metric.id === "humidity") {
        const high = maxFiniteValue(rows, "humidity");
        return Number.isFinite(high) ? trendValueParts(String(round(high)), "%") : trendValueParts("n/a");
      }

      if (metric.id === "visibility") {
        const high = maxFiniteValue(rows, "visibility");
        return Number.isFinite(high) ? trendValueParts(String(round(high, 1)), "km") : trendValueParts("n/a");
      }

      if (metric.id === "pm2_5" || metric.id === "dust") return trendValueParts(aqRangeLabel(maxFiniteValue(rows, metric.id)), "&micro;g/m&sup3;");
      if (pollenKeys.includes(metric.id)) return trendValueParts(aqRangeLabel(maxFiniteValue(rows, metric.id)), "𖡼/m&sup3;");
      return trendValueParts(metric.value(rows[0]));
    }

    function scrubTrendValueParts(metric, data) {
      if (metric.id === "temperature") return trendValueParts(`${data.actual}/~${data.feels}`, "&deg;C");
      if (metric.id === "rain") return trendValueParts(fixedNumber(data.rain), "mm");
      if (metric.id === "wind") return trendValueParts(`${data.wind}-${data.gust}`, windUnitHtml());
      if (metric.id === "humidity") return trendValueParts(String(data.humidity), "%");
      if (metric.id === "visibility") return trendValueParts(String(data.visibility), "km");
      if (metric.id === "pm2_5" || metric.id === "dust") return trendValueParts(aqRangeLabel(data[metric.id]), "&micro;g/m&sup3;");
      if (pollenKeys.includes(metric.id)) return trendValueParts(aqRangeLabel(data[metric.id]), "𖡼/m&sup3;");
      return trendValueParts(metric.value(data));
    }

    function trendDisplayParts(metric, data = dataForHour(selectedHour)) {
      return scrubberVisible ? scrubTrendValueParts(metric, data) : dailyTrendSummaryParts(metric, dayRowsForVisibility());
    }

    function trendDisplayValue(metric, data = dataForHour(selectedHour)) {
      const parts = trendDisplayParts(metric, data);
      return `
        <span class="trend-number">${parts.value}</span>
        ${parts.unit ? `<span class="trend-unit">${parts.unit}</span>` : ""}
      `;
    }

    function trendRangeValue(metric, value) {
      if (!Number.isFinite(value)) return "";
      if (metric.id === "temperature") return `${round(value)}&deg;`;
      if (metric.id === "rain") return fixedNumber(value);
      if (metric.id === "visibility") return String(round(value, 1));
      if (isAirQualityMetric(metric.id)) return aqRangeLabel(value);
      return String(round(value));
    }

    function datedRowsForTrendWindow() {
      const selectedDate = selectedOpenMeteoDate();
      if (selectedDate && openMeteoRows.length) {
        const startDate = addDays(selectedDate, -29);
        return openMeteoRows.filter((row) => row.date >= startDate && row.date <= selectedDate && row.h < 24);
      }
      const fallbackDate = selectedDateForGlyphs();
      return dayRowsForVisibility().map((row) => ({
        ...row,
        date: row.date || fallbackDate
      }));
    }

    function trendHistoryMetricValue(rows, metric) {
      if (metric.id === "temperature") return averageFinite(rows, "actual");
      if (metric.id === "rain") {
        const values = finiteMetricValues(rows, "rain");
        return values.length ? values.reduce((sum, value) => sum + value, 0) : null;
      }
      if (metric.id === "wind") return averageFinite(rows, "wind");
      if (metric.id === "humidity") return averageFinite(rows, "humidity");
      if (metric.id === "visibility") return maxFiniteValue(rows, "visibility");
      if (isAirQualityMetric(metric.id)) return airHistoryMetricValue(rows, metric.id);
      return averageFinite(rows, metric.id);
    }

    function trendDailyValues(rows, metric) {
      const rowsByDate = rows
        .filter((row) => row.date && row.h < 24)
        .reduce((groups, row) => {
          if (!groups.has(row.date)) groups.set(row.date, []);
          groups.get(row.date).push(row);
          return groups;
        }, new Map());
      return [...rowsByDate.entries()]
        .map(([date, dayRows]) => ({
          date,
          value: trendHistoryMetricValue(dayRows, metric)
        }))
        .filter((item) => Number.isFinite(item.value));
    }

    function trendHistoryRange(metric) {
      const selectedDate = selectedOpenMeteoDate() || selectedDateForGlyphs();
      const windowRows = datedRowsForTrendWindow();
      const dailyValues = trendDailyValues(windowRows, metric);
      const currentValue = dailyValues.find((item) => item.date === selectedDate)?.value;
      const values = dailyValues.map((item) => item.value).filter(Number.isFinite);
      if (!values.length || !Number.isFinite(currentValue)) return null;

      const min = Math.min(...values);
      const max = Math.max(...values);
      const ratio = aqRangePosition(min, max, currentValue);
      const recentRange = recentAqValueRange(dailyValues, selectedDate);
      const recentOutline = recentRange
        ? aqRangeSegment(min, max, recentRange.min, recentRange.max)
        : { start: 0, width: 0 };
      const points = dailyValues
        .map((item) => {
          const pointRatio = aqRangePosition(min, max, item.value);
          if (!Number.isFinite(pointRatio)) return null;
          const ageDays = dateDistanceDays(item.date, selectedDate);
          return {
            ratio: pointRatio,
            opacity: recentAqOpacity(ageDays),
            date: item.date
          };
        })
        .filter(Boolean);

      return {
        key: metric.id,
        label: metric.label,
        color: metric.color,
        min,
        max,
        current: currentValue,
        ratio,
        trend: aqTrendDirection(dailyValues, selectedDate),
        recentOutline,
        points,
        rangeValue: (value) => trendRangeValue(metric, value)
      };
    }

    function airHistoryRowsByKey() {
      return new Map(aqHistoryRows(visibleAirHistoryColumns()).map((row) => [
        row.key,
        {
          ...row,
          rangeValue: aqRangeLabel
        }
      ]));
    }

    function trendRangeForMetric(metric, airRowsByKey) {
      if (isAirQualityMetric(metric.id) && airRowsByKey.has(metric.id)) return airRowsByKey.get(metric.id);
      return trendHistoryRange(metric);
    }

    function renderTrendRange(row) {
      if (!row) {
        return `
          <span class="aq-history-range" aria-hidden="true">
            <span class="aq-range-number"></span>
            <span class="aq-range-line"></span>
            <span class="aq-range-number"></span>
          </span>
        `;
      }

      const formatRangeValue = row.rangeValue || aqRangeLabel;
      return `
        <span class="aq-history-range" aria-label="${row.label} range ${formatRangeValue(row.min)} to ${formatRangeValue(row.max)}, current ${formatRangeValue(row.current)}${aqTrendLabel(row.trend)}">
          <span class="aq-range-number">${formatRangeValue(row.min)}</span>
          <span class="aq-range-line">
            ${row.recentOutline.width > 0 ? `<span class="aq-range-recent-outline"></span>` : ""}
            ${row.points.map((point) => `<span class="aq-range-point" style="--point-pos: ${(point.ratio * 100).toFixed(1)}%; --point-opacity: ${point.opacity.toFixed(2)}"></span>`).join("")}
            <span class="aq-range-marker" data-trend="${row.trend}" style="--pos: ${(row.ratio * 100).toFixed(1)}%"></span>
          </span>
          <span class="aq-range-number">${formatRangeValue(row.max)}</span>
        </span>
      `;
    }

    function trendIconName(metricId) {
      if (metricId === "temperature") return "cloud";
      if (metricId === "rain") return "drop";
      if (metricId === "wind") return "wind";
      if (metricId === "humidity") return "humidity";
      if (metricId === "visibility") return "eye";
      if (metricId === "pm2_5" || metricId === "dust") return "gauge";
      if (pollenKeys.includes(metricId)) return "sun";
      return "gauge";
    }

    function trendIcon(metricId) {
      const icon = trendIconName(metricId);
      const paths = {
        cloud: `
          <path d="M7.5 17H17a4 4 0 0 0 .4-8 5.8 5.8 0 0 0-11.1 1.6A3.3 3.3 0 0 0 7.5 17Z"></path>
          <path d="M17.6 9A4.2 4.2 0 1 0 13 4.9"></path>
        `,
        sun: `
          <circle cx="12" cy="12" r="4.2"></circle>
          <path d="M12 2.8v2.1M12 19.1v2.1M4.4 4.4l1.5 1.5M18.1 18.1l1.5 1.5M2.8 12h2.1M19.1 12h2.1M4.4 19.6l1.5-1.5M18.1 5.9l1.5-1.5"></path>
        `,
        wind: `
          <path d="M3 9h11.5a3 3 0 1 0-2.8-4"></path>
          <path d="M3 13h15.5a2.7 2.7 0 1 1-2.4 3.9"></path>
          <path d="M3 17h8"></path>
        `,
        drop: `
          <path d="M12 3.2C8.6 7.7 6.8 10.8 6.8 13.5a5.2 5.2 0 0 0 10.4 0C17.2 10.8 15.4 7.7 12 3.2Z"></path>
        `,
        humidity: `
          <path d="M3 8.5c3.5 1.6 5.8-1.8 9.2-.2 2 .9 3.4.5 4.9-.5"></path>
          <path d="M3 12.2c3.5 1.6 5.8-1.8 9.2-.2"></path>
          <path d="M3 15.9c3.5 1.6 5.8-1.8 9.2-.2"></path>
          <path d="M17.5 10.3c-2 2.7-3 4.5-3 6.1a3 3 0 0 0 6 0c0-1.6-1-3.4-3-6.1Z"></path>
        `,
        eye: `
          <path d="M2.8 12s3.4-5.2 9.2-5.2 9.2 5.2 9.2 5.2-3.4 5.2-9.2 5.2S2.8 12 2.8 12Z"></path>
          <circle cx="12" cy="12" r="2.1"></circle>
        `,
        gauge: `
          <circle cx="12" cy="12" r="8.4"></circle>
          <path d="M12 12l2.2-4.2"></path>
          <path d="M7.2 8.8h.1M16.7 8.8h.1M5.8 13.4h.1M18.1 13.4h.1M8.3 17h.1M15.6 17h.1"></path>
        `
      };
      return `<svg class="trend-icon" viewBox="0 0 24 24" aria-hidden="true">${paths[icon]}</svg>`;
    }

    function updateTrendGridColumns() {
      const items = [...legend.querySelectorAll(".trend-item")];
      const gridWidth = legend.getBoundingClientRect().width;
      if (!items.length || gridWidth <= 0) {
        legend.style.setProperty("--trend-columns", String(defaultTrendColumns));
        return;
      }

      const style = window.getComputedStyle(legend);
      const gap = Number.parseFloat(style.columnGap || style.gap) || 0;
      const tileHeight = items[0].getBoundingClientRect().height || 54;
      const baseTileWidth = (gridWidth - gap * (defaultTrendColumns - 1)) / defaultTrendColumns;
      const shouldAddColumns = baseTileWidth / tileHeight > maxTrendTileAspectRatio;
      const columns = shouldAddColumns
        ? Math.max(defaultTrendColumns, Math.min(items.length, Math.ceil((gridWidth + gap) / (tileHeight * maxTrendTileAspectRatio + gap))))
        : defaultTrendColumns;

      legend.style.setProperty("--trend-columns", String(columns));
    }

    function drawLegend() {
      legend.innerHTML = "";
      clearHiddenFocusedMetric();
      const airRowsByKey = airHistoryRowsByKey();
      visibleMetricConfigs().forEach((metric) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "trend-item";
        button.dataset.metric = metric.id;
        button.setAttribute("aria-label", metric.label);
        button.setAttribute("aria-pressed", String(focusedMetric() === metric.id));
        button.style.setProperty("--trend-color", metric.color);
        button.style.setProperty("--aq-color", metric.color);
        const rangeRow = trendRangeForMetric(metric, airRowsByKey);
        if (rangeRow) {
          button.style.setProperty("--recent-outline-start", `${rangeRow.recentOutline.start.toFixed(1)}%`);
          button.style.setProperty("--recent-outline-width", `${rangeRow.recentOutline.width.toFixed(1)}%`);
        }
        button.innerHTML = `
          <span class="trend-top">
            <span class="trend-label" title="${metric.label}">
              ${trendIcon(metric.id)}
              <span class="trend-label-text">${metric.label}</span>
            </span>
            <span class="trend-value" data-value="${metric.id}">${trendDisplayValue(metric)}</span>
          </span>
          ${renderTrendRange(rangeRow)}
        `;
        button.addEventListener("click", () => {
          const wasActive = activeMetric === metric.id;
          activeMetric = wasActive ? null : metric.id;
          hoverMetric = null;
          suppressedHoverMetric = wasActive ? metric.id : null;
          render();
        });
        legend.appendChild(button);
      });
      updateTrendGridColumns();
    }

    function setHoverFocus(metric) {
      if (activeMetric) return;
      if (hoverMetric === metric) return;

      const previousMetric = hoverMetric;
      hoverMetric = metric;
      if (needsFocusRender(previousMetric) || needsFocusRender(metric)) {
        render();
      } else {
        setHighlight(metric);
      }
    }

    function legendMetricFromEvent(event) {
      const item = event.target.closest?.(".trend-item");
      return item?.dataset.metric || null;
    }

    function setHighlight(metric) {
      document.querySelectorAll(".series").forEach((el) => {
        const match = metric && el.dataset.metric === metric;
        el.classList.toggle("dimmed", Boolean(metric && !match));
        el.classList.toggle("highlighted", Boolean(match));
      });
      document.querySelectorAll(".trend-item").forEach((item) => {
        const match = metric && item.dataset.metric === metric;
        item.classList.toggle("is-focused", Boolean(match));
        item.setAttribute("aria-pressed", String(Boolean(match)));
      });
    }

    function updateHighlight() {
      setHighlight(focusedMetric());
    }

    function formatHour(hour) {
      if (hour === 24) return "24:00";
      let whole = Math.floor(hour);
      let minutes = Math.round((hour - whole) * 60);
      if (minutes === 60) {
        whole += 1;
        minutes = 0;
      }
      return `${String(whole).padStart(2, "0")}:${String(minutes).padStart(2, "0")}`;
    }

    function formatSelectedHour(hour) {
      if (!isWeekView()) return formatHour(hour);
      const startDate = selectedOpenMeteoDate();
      if (!startDate) return formatHour(hourWithinDay(hour));
      const dayIndex = Math.min(6, Math.max(0, Math.floor(hour / 24)));
      return `${formatWeekdayShort(addDays(startDate, dayIndex))} ${formatHour(hourWithinDay(hour))}`;
    }

    function formatChartDate(dateString) {
      if (!dateString) return "Sample day";
      const [year, month, day] = dateString.split("-").map(Number);
      const date = new Date(Date.UTC(year, month - 1, day));
      return new Intl.DateTimeFormat("en", {
        month: "short",
        day: "numeric",
        year: "numeric",
        timeZone: "UTC"
      }).format(date);
    }

    function formatWeekday(dateString) {
      if (!dateString) return "";
      const [year, month, day] = dateString.split("-").map(Number);
      const date = new Date(Date.UTC(year, month - 1, day));
      return new Intl.DateTimeFormat("en", {
        weekday: "long",
        timeZone: "UTC"
      }).format(date);
    }

    function formatWeekdayShort(dateString) {
      if (!dateString) return "";
      const [year, month, day] = dateString.split("-").map(Number);
      const date = new Date(Date.UTC(year, month - 1, day));
      return new Intl.DateTimeFormat("en", {
        weekday: "short",
        timeZone: "UTC"
      }).format(date);
    }

    function formatCompactDate(dateString) {
      if (!dateString) return "";
      const [year, month, day] = dateString.split("-").map(Number);
      const date = new Date(Date.UTC(year, month - 1, day));
      return new Intl.DateTimeFormat("en", {
        month: "short",
        day: "numeric",
        timeZone: "UTC"
      }).format(date);
    }

    function formatWeekRangeLabel() {
      const startDate = selectedOpenMeteoDate();
      if (!startDate) return "7 days";
      return `7 days · ${formatCompactDate(startDate)}-${formatCompactDate(addDays(startDate, 6))}`;
    }

    function chartDateLabel() {
      if (isWeekView()) return formatWeekRangeLabel();
      const selectedDate = selectedOpenMeteoDate();
      if (!selectedDate) return "Sample day";
      const relative = dayOffsetLabel(selectedDayOffset);
      return `${relative[0].toUpperCase()}${relative.slice(1)} · ${formatChartDate(selectedDate)}`;
    }

    function compactDateLabel() {
      if (isWeekView()) return "7 days";
      const selectedDate = selectedOpenMeteoDate();
      if (!selectedDate) return "Today";
      const relative = dayOffsetLabel(selectedDayOffset);
      return relative[0].toUpperCase() + relative.slice(1);
    }

    function inferLocationName(lat, lon) {
      const known = knownLocations.find((location) => (
        Math.abs(lat - location.lat) <= location.tolerance
        && Math.abs(lon - location.lon) <= location.tolerance
      ));
      if (known) return known.name;
      return `${round(lat, 2)}, ${round(lon, 2)}`;
    }

    function activeLocationName() {
      if (openMeteoLocation?.name) return openMeteoLocation.name;
      const { lat, lon } = activeLocation();
      return inferLocationName(lat, lon);
    }

    function severeWeatherRank(code) {
      if (code === 96 || code === 99) return 4;
      if (code >= 95) return 3;
      return 0;
    }

    function downpourRank(row) {
      const code = row.weatherCode;
      const rain = Number.isFinite(row.rain) ? row.rain : 0;
      if (code === 82 || code === 67 || rain >= 5) return 3;
      if (code === 65 || code === 81 || rain >= 2) return 2;
      return 0;
    }

    function highestRankedPoint(rows, ranker) {
      return rows.reduce((best, row) => {
        const rank = ranker(row);
        if (rank <= 0) return best;
        if (!best) return { row, rank };
        if (rank > best.rank) return { row, rank };
        if (rank === best.rank && row.h < best.row.h) return { row, rank };
        return best;
      }, null)?.row || null;
    }

    function severeWeatherPoint(rows) {
      return highestRankedPoint(rows, (row) => severeWeatherRank(row.weatherCode));
    }

    function downpourPoint(rows) {
      return rows.reduce((best, row) => {
        const rank = downpourRank(row);
        if (rank <= 0) return best;
        const rain = Number.isFinite(row.rain) ? row.rain : 0;
        if (!best) return { row, rank, rain };
        if (rank > best.rank) return { row, rank, rain };
        if (rank === best.rank && rain > best.rain) return { row, rank, rain };
        if (rank === best.rank && rain === best.rain && row.h < best.row.h) return { row, rank, rain };
        return best;
      }, null)?.row || null;
    }

    function formatRainOutlier(rows) {
      const downpour = downpourPoint(rows);
      if (downpour) {
        if (Number.isFinite(downpour.rain) && downpour.rain > 0) return `🌧️ ${downpour.rain.toFixed(1)} mm`;
        return "🌧️";
      }

      const rainPeak = maxFinitePoint(rows, "rain");
      if (rainPeak && rainPeak.rain > 0) return `Rain ${rainPeak.rain.toFixed(1)} mm`;
      return "";
    }

    function airQualityOutliers(rows) {
      const items = [];
      const pm25Peak = maxFinitePoint(rows, "pm2_5");
      const dustPeak = maxFinitePoint(rows, "dust");
      const pollen = peakPollenForRows(rows);

      if (pm25Peak && Number.isFinite(pm25Peak.pm2_5) && pm25Peak.pm2_5 >= 10) {
        items.push(`PM2.5 ${formatConcentration(pm25Peak.pm2_5)}`);
      }
      if (dustPeak && Number.isFinite(dustPeak.dust) && dustPeak.dust >= 10) {
        items.push(`Dust ${formatConcentration(dustPeak.dust)}`);
      }
      if (pollen && pollen.value >= 15) {
        items.push(`${pollen.label || "Pollen"} ${formatPollen(pollen.value)}`);
      }
      return items;
    }

    function headerOutliers() {
      const rows = dayRowsForVisibility();
      const severe = severeWeatherPoint(rows);
      const severeOutlier = severe ? "⛈️" : "";
      return [severeOutlier, formatRainOutlier(rows), ...airQualityOutliers(rows)].filter(Boolean);
    }

    function updateLegendValues() {
      const data = dataForHour(selectedHour);
      metricConfig.forEach((metric) => {
        const valueNode = legend.querySelector(`[data-value="${metric.id}"]`);
        if (valueNode) valueNode.innerHTML = trendDisplayValue(metric, data);
      });
    }

    function visibleAirHistoryColumns() {
      return airHistoryColumns.filter((column) => (
        airQualityComparisons.some((item) => {
          const value = item.metrics?.[column.key];
          const range = item.rangeMetrics?.[column.key];
          return (Number.isFinite(value) && value > 0) || (range && Number.isFinite(range.max) && range.max > 0);
        })
      ));
    }

    function airHistoryMetricValue(rows, key) {
      if (pollenKeys.includes(key)) return maxFiniteValue(rows, key);
      return averageFinite(rows, key);
    }

    function dateDistanceDays(startDate, endDate) {
      const [startYear, startMonth, startDay] = startDate.split("-").map(Number);
      const [endYear, endMonth, endDay] = endDate.split("-").map(Number);
      const start = Date.UTC(startYear, startMonth - 1, startDay);
      const end = Date.UTC(endYear, endMonth - 1, endDay);
      return Math.round((end - start) / (24 * 60 * 60 * 1000));
    }

    function recentAqOpacity(ageDays) {
      if (!Number.isFinite(ageDays)) return 0.1;
      if (ageDays <= 0) return 1;
      if (ageDays <= 5) return 1 - (ageDays / 5) * 0.3;
      if (ageDays <= 7) return 0.7 - ((ageDays - 5) / 2) * 0.2;
      if (ageDays <= 10) return 0.5 - ((ageDays - 7) / 3) * 0.2;
      return 0.1;
    }

    function aqRangePosition(min, max, value) {
      if (!Number.isFinite(value)) return null;
      if (min === max) return 0.5;
      return clamp((value - min) / (max - min), 0, 1);
    }

    function aqRangeSegment(min, max, segmentMin, segmentMax) {
      if (![min, max, segmentMin, segmentMax].every(Number.isFinite)) {
        return { start: 0, width: 0 };
      }
      if (min === max) return { start: 0, width: 100 };
      let start = aqRangePosition(min, max, segmentMin) * 100;
      let end = aqRangePosition(min, max, segmentMax) * 100;
      if (end < start) [start, end] = [end, start];
      if (end - start < 2.4) {
        const center = (start + end) / 2;
        start = clamp(center - 1.2, 0, 97.6);
        end = start + 2.4;
      }
      return {
        start,
        width: end - start
      };
    }

    function recentAqValueRange(values, currentDate, count = 5) {
      const recentValues = values
        .map((item) => ({
          ...item,
          ageDays: dateDistanceDays(item.date, currentDate)
        }))
        .filter((item) => item.ageDays >= 0)
        .sort((a, b) => a.ageDays - b.ageDays)
        .slice(0, count)
        .map((item) => item.value)
        .filter(Number.isFinite);
      if (!recentValues.length) return null;
      return {
        min: Math.min(...recentValues),
        max: Math.max(...recentValues)
      };
    }

    function aqTrendDirection(values, currentDate) {
      const recentValues = values
        .map((item) => ({
          ...item,
          ageDays: dateDistanceDays(item.date, currentDate)
        }))
        .filter((item) => item.ageDays >= 0 && item.ageDays <= 6)
        .sort((a, b) => a.ageDays - b.ageDays)
        .reverse();
      if (recentValues.length < 2) return "flat";

      const firstValue = recentValues[0].value;
      const lastValue = recentValues[recentValues.length - 1].value;
      const valuesOnly = recentValues.map((item) => item.value);
      const span = Math.max(...valuesOnly) - Math.min(...valuesOnly);
      const threshold = Math.max(0.1, span * 0.08);
      const delta = lastValue - firstValue;
      if (Math.abs(delta) <= threshold) return "flat";
      return delta > 0 ? "rising" : "falling";
    }

    function aqTrendLabel(trend) {
      if (trend === "rising") return ", rising over the last 7 days";
      if (trend === "falling") return ", falling over the last 7 days";
      return "";
    }

    function aqHistoryRows(columns) {
      const current = airQualityComparisons.find((item) => item.isCurrent);
      return columns.map((column) => {
        const ranges = airQualityComparisons
          .map((item) => item.rangeMetrics?.[column.key])
          .filter((range) => range && Number.isFinite(range.min) && Number.isFinite(range.max));
        const currentValue = current?.metrics?.[column.key];
        if (!ranges.length || !Number.isFinite(currentValue)) return null;
        const min = Math.min(...ranges.map((range) => range.min));
        const max = Math.max(...ranges.map((range) => range.max));
        const ratio = aqRangePosition(min, max, currentValue);
        const dailyValues = dailyMetricValues(current?.windowRows || [], column.key);
        const recentRange = recentAqValueRange(dailyValues, current.date);
        const recentOutline = recentRange
          ? aqRangeSegment(min, max, recentRange.min, recentRange.max)
          : { start: 0, width: 0 };
        const points = dailyValues
          .map((item) => {
            const pointRatio = aqRangePosition(min, max, item.value);
            if (!Number.isFinite(pointRatio)) return null;
            const ageDays = dateDistanceDays(item.date, current.date);
            return {
              ratio: pointRatio,
              opacity: recentAqOpacity(ageDays),
              date: item.date
            };
          })
          .filter(Boolean);
        return {
          ...column,
          min,
          max,
          current: currentValue,
          ratio,
          trend: aqTrendDirection(dailyValues, current.date),
          recentOutline,
          points
        };
      }).filter(Boolean);
    }

    function aqRangeLabel(value) {
      return Number.isFinite(value) ? String(round(value, 1)) : "";
    }

    function updateReadout() {
      const data = dataForHour(selectedHour);
      const weatherSummary = [`Actual ${data.actual}&deg;C`, `~${data.feels}&deg;C`];
      const airSummary = [];
      const strongestPollen = strongestPollenAt(data);
      if (selectedTime) selectedTime.textContent = formatSelectedHour(selectedHour);
      if (selectedDateLabel) selectedDateLabel.textContent = chartDateLabel();
      if (Number.isFinite(data.rain) && data.rain > 0) {
        weatherSummary.push(`rain ${data.rain.toFixed(1)} mm`);
      }
      if (Number.isFinite(data.pm2_5) && data.pm2_5 >= 10) airSummary.push(`PM2.5 ${formatConcentration(data.pm2_5)}`);
      if (Number.isFinite(data.dust) && data.dust > 0) airSummary.push(`dust ${formatConcentration(data.dust)}`);
      if (strongestPollen) airSummary.push(`${metricConfig.find((metric) => metric.id === strongestPollen.key)?.label || "𖡼"} ${formatPollen(strongestPollen.value)}`);
      if (selectedSummary) selectedSummary.innerHTML = `${weatherSummary.join(", ")}${airSummary.length ? ` · ${airSummary.join(", ")}` : ""}`;
      updateLegendValues();
      updateScrubber();
    }

    function updateScrubber() {
      const existing = document.getElementById("scrubber");
      if (existing) existing.remove();
      drawScrubber();
    }

    function drawEvents() {
      const uv = getUvEvents();
      const dayRows = dayRowsForVisibility();
      const rainStart = forecast.find((d) => d.rain > 0);
      const severe = severeWeatherPoint(dayRows);
      const downpour = downpourPoint(dayRows);
      const gustPeak = forecast.reduce((best, d) => d.gust > best.gust ? d : best, forecast[0]);
      const visibilityLow = forecast.reduce((best, d) => d.visibility < best.visibility ? d : best, forecast[0]);
      const dustPeak = maxFinitePoint(forecast, "dust");
      const pollenPeak = peakPollenEvent();
      const sunEvents = selectedSunEvents();
      const eventDate = selectedDateForGlyphs();
      const events = [];
      const addEvent = (event) => {
        if (Number.isFinite(event.hour)) events.push({ ...event, order: events.length });
      };

      if (sunEvents && Number.isFinite(sunEvents.sunriseHour)) {
        addEvent({ hour: sunEvents.sunriseHour, color: colors.actual, label: "Sunrise", value: formatAzimuth(eventDate, sunEvents.sunriseHour) });
      }
      if (sunEvents) {
        const noonHour = solarNoonHour(sunEvents);
        if (Number.isFinite(noonHour)) addEvent({ hour: noonHour, color: colors.actual, label: "Noon", value: formatAzimuth(eventDate, noonHour) });
      }
      if (sunEvents && Number.isFinite(sunEvents.sunsetHour)) {
        addEvent({ hour: sunEvents.sunsetHour, color: colors.actual, label: "Sunset", value: formatAzimuth(eventDate, sunEvents.sunsetHour) });
      }
      if (uv.above) addEvent({ hour: uv.above.h, color: colors.uv, label: "UV", value: "≥3" });
      if (uv.peak && uv.peak.uv > 0) addEvent({ hour: uv.peak.h, color: colors.uv, label: "UV peak", value: String(uv.peak.uv) });
      if (uv.below) addEvent({ hour: uv.below.h, color: colors.uv, label: "UV", value: "<3" });
      if (rainStart) addEvent({ hour: rainStart.h, color: colors.rain, label: "Rain begins", value: formatUnit(rainStart.rain, "mm") });
      if (severe) {
        addEvent({
          hour: severe.h,
          color: colors.rain,
          label: severe.weatherCode === 96 || severe.weatherCode === 99 ? "Severe storms" : "Thunderstorms",
          value: conditionDescription(severe.weatherCode)
        });
      }
      if (downpour) {
        addEvent({
          hour: downpour.h,
          color: colors.rain,
          label: "Peak downpour",
          value: Number.isFinite(downpour.rain) && downpour.rain > 0 ? formatUnit(downpour.rain, "mm") : conditionDescription(downpour.weatherCode)
        });
      }
      if (gustPeak && gustPeak.gust > 0) addEvent({ hour: gustPeak.h, color: colors.wind, label: "Peak gust", value: `${gustPeak.gust} ${windUnitHtml()}` });
      if (visibilityLow && visibilityLow.visibility > 0) addEvent({ hour: visibilityLow.h, color: colors.visibility, label: "Lowest visibility", value: `${visibilityLow.visibility} km` });
      if (dustPeak && dustPeak.dust > 0) addEvent({ hour: dustPeak.h, color: colors.dust, label: "Peak dust", value: formatConcentration(dustPeak.dust) });
      if (pollenPeak && pollenPeak.value > 0) {
        addEvent({
          hour: pollenPeak.h,
          color: colors[pollenPeak.key],
          label: `Peak ${pollenPeak.label} 𖡼`,
          value: formatPollen(pollenPeak.value)
        });
      }

      events.sort((a, b) => a.hour - b.hour || a.order - b.order);

      eventList.innerHTML = events.map((event) => `
        <div class="event-row">
          <span class="event-time">${formatHour(event.hour)}</span>
          <span class="event-dot" style="--dot: ${event.color}"></span>
          <span>${event.label}</span>
          <strong>${event.value}</strong>
        </div>
      `).join("");
    }

    function getHourFromPointer(event) {
      const bounds = svg.getBoundingClientRect();
      const localX = ((event.clientX - bounds.left) / bounds.width) * layout.width;
      const ratio = clamp((localX - layout.left) / chartWidth, 0, 1);
      return Math.round(ratio * chartDomainHours());
    }

    function setSelectedHour(hour) {
      selectedHour = clamp(Math.round(hour), 0, chartDomainHours());
      updateReadout();
    }

    function maxFinitePoint(rows, key) {
      return rows.reduce((best, row) => {
        const value = row[key];
        if (!Number.isFinite(value)) return best;
        if (!best || value > best[key]) return row;
        return best;
      }, null);
    }

    function peakPollenEvent() {
      return peakPollenForRows(forecast);
    }

    function handlePointer(event) {
      setSelectedHour(getHourFromPointer(event));
    }

    function clearScrubberHideTimer() {
      if (!scrubberHideTimer) return;
      window.clearTimeout(scrubberHideTimer);
      scrubberHideTimer = null;
    }

    function scheduleScrubberHide() {
      clearScrubberHideTimer();
      scrubberHideTimer = window.setTimeout(() => {
        scrubberHideTimer = null;
        setScrubberVisible(false);
      }, scrubberTapVisibleMs);
    }

    function releaseChartPointer(event) {
      if (chartWrap.hasPointerCapture(event.pointerId)) chartWrap.releasePointerCapture(event.pointerId);
    }

    function lockChartScroll() {
      if (chartScrollLocked) return;
      chartScrollLocked = true;
      chartScrollLockY = window.scrollY || document.documentElement.scrollTop || 0;
      document.body.style.setProperty("--chart-scroll-lock-top", `-${chartScrollLockY}px`);
      document.body.classList.add("is-chart-scrubbing");
    }

    function unlockChartScroll() {
      if (!chartScrollLocked) return;
      chartScrollLocked = false;
      document.body.classList.remove("is-chart-scrubbing");
      document.body.style.removeProperty("--chart-scroll-lock-top");
      window.scrollTo(0, chartScrollLockY);
    }

    function preventTouchScrollWhileScrubbing(event) {
      if (!chartScrollLocked || !event.cancelable) return;
      event.preventDefault();
    }

    function cancelPageSwipeForPointer(pointerId) {
      if (pageSwipeGesture && pageSwipeGesture.pointerId === pointerId) pageSwipeGesture.cancelled = true;
    }

    function preventNativeChartTouch(event) {
      if (event.pointerType === "mouse") return;
      if (event.cancelable && typeof event.preventDefault === "function") event.preventDefault();
    }

    function chartPointerSnapshot(event) {
      return {
        pointerId: event.pointerId,
        pointerType: event.pointerType,
        clientX: event.clientX,
        clientY: event.clientY,
        cancelable: false
      };
    }

    function clearChartLongPressTimer() {
      if (!chartLongPressTimer) return;
      window.clearTimeout(chartLongPressTimer);
      chartLongPressTimer = null;
    }

    function cancelChartLongPress(pointerId = null) {
      if (pointerId === null || chartLongPressGesture?.pointerId === pointerId) {
        clearChartLongPressTimer();
        chartLongPressGesture = null;
      }
    }

    function beginChartLongPress(event) {
      if (event.pointerType === "mouse") return;
      clearChartLongPressTimer();
      chartLongPressGesture = {
        pointerId: event.pointerId,
        startX: event.clientX,
        startY: event.clientY,
        current: chartPointerSnapshot(event)
      };
      chartLongPressTimer = window.setTimeout(() => {
        const gesture = chartLongPressGesture;
        chartLongPressTimer = null;
        if (!gesture || !chartGesture || chartGesture.pointerId !== gesture.pointerId || chartGesture.active) return;
        activateChartScrub(gesture.current);
      }, chartLongPressMs);
    }

    function updateChartLongPress(event) {
      if (!chartLongPressGesture || chartLongPressGesture.pointerId !== event.pointerId) return;
      chartLongPressGesture.current = chartPointerSnapshot(event);
      const dx = event.clientX - chartLongPressGesture.startX;
      const dy = event.clientY - chartLongPressGesture.startY;
      if (Math.hypot(dx, dy) > chartLongPressMoveTolerance) cancelChartLongPress(event.pointerId);
    }

    function activateChartScrub(event) {
      clearScrubberHideTimer();
      clearChartLongPressTimer();
      cancelPageSwipeForPointer(event.pointerId);
      preventNativeChartTouch(event);
      if (event.pointerType !== "mouse") lockChartScroll();
      if (!chartWrap.hasPointerCapture(event.pointerId)) chartWrap.setPointerCapture(event.pointerId);
      if (chartGesture && chartGesture.pointerId === event.pointerId) chartGesture.active = true;
      setScrubberVisible(true);
      handlePointer(event);
    }

    function updatePanelVisibility() {
      const weekView = isWeekView();
      if (chartDetails) {
        chartDetails.hidden = false;
        chartDetails.classList.toggle("is-week-view", weekView);
      }
      if (trendPanel) trendPanel.hidden = false;
      if (eventPanel) eventPanel.hidden = weekView;
    }

    function render() {
      updatePanelVisibility();
      configureLayout();
      plot.innerHTML = "";
      clearVisibilityMask();
      clearHistoryFadeMask();
      clearConditionGlyphDefs();
      clearHiddenFocusedMetric();
      drawConditions();
      drawGrid();

      const historyFadeMaskId = createHistoryFadeMask();
      seriesRootLayer = makeEl("g", { "data-layer": "series-root" });
      if (historyFadeMaskId) seriesRootLayer.setAttribute("mask", `url(#${historyFadeMaskId})`);
      plot.appendChild(seriesRootLayer);

      const lowerWeatherLayer = makeEl("g", { "data-layer": "below-visibility" });
      seriesRootLayer.appendChild(lowerWeatherLayer);
      activeSeriesLayer = lowerWeatherLayer;
      drawHumidity();
      drawWind();
      activeSeriesLayer = null;
      applyVisibilityTreatment(lowerWeatherLayer);

      drawAirQuality();
      drawTemperature();
      drawRain();
      if (!isWeekView()) drawUv();
      seriesRootLayer = null;
      drawScrubber();
      drawLegend();
      if (isWeekView()) {
        eventList.innerHTML = "";
      } else {
        drawEvents();
      }
      updateReadout();
      updateCurrentChip();
      updateHighlight();
      updateDayControls();
    }

    function updateCurrentChip() {
      currentCity.textContent = activeLocationName();
      currentDateLabel.textContent = compactDateLabel();
      currentTemp.innerHTML = `${Math.round(currentWeather.actual)}&deg;C`;
      currentDesc.textContent = conditionDescription(currentWeather.weatherCode);
      const outliers = headerOutliers();
      outlierSummary.innerHTML = outliers.join(" · ");
      outlierSummary.hidden = outliers.length === 0;
    }

    function setStatus(text) {
      dataStatus.textContent = text;
    }

    function isoDateFromTime(time) {
      return String(time || "").slice(0, 10);
    }

    function addDays(dateString, days) {
      const [year, month, day] = dateString.split("-").map(Number);
      const date = new Date(Date.UTC(year, month - 1, day + days));
      return date.toISOString().slice(0, 10);
    }

    function hourFromTime(time) {
      return Number(String(time).slice(11, 13));
    }

    function hourWithinDay(hour) {
      return ((hour % 24) + 24) % 24;
    }

    function daysBetween(startDate, dateString) {
      const [startYear, startMonth, startDay] = startDate.split("-").map(Number);
      const [year, month, day] = dateString.split("-").map(Number);
      const start = Date.UTC(startYear, startMonth - 1, startDay);
      const date = Date.UTC(year, month - 1, day);
      return Math.round((date - start) / 86400000);
    }

    function chartHourForDate(dateString, hour, startDate = selectedOpenMeteoDate(0)) {
      return daysBetween(startDate, dateString) * 24 + hour;
    }

    function dayOffsetLabel(offset) {
      if (offset === 0) return "today";
      if (offset === -1) return "yesterday";
      if (offset === 1) return "tomorrow";
      return formatWeekday(selectedOpenMeteoDate(offset)) || (offset < 0 ? "Previous day" : "Next day");
    }

    function selectedOpenMeteoDate(offset = selectedDayOffset) {
      return openMeteoReferenceDate ? addDays(openMeteoReferenceDate, offset) : "";
    }

    function hasOpenMeteoDay(offset) {
      const date = selectedOpenMeteoDate(offset);
      if (!date) return false;
      return openMeteoRows.filter((row) => row.date === date && row.h < 24).length >= 12;
    }

    function hasOpenMeteoWeek(offset = selectedDayOffset) {
      const startDate = selectedOpenMeteoDate(offset);
      if (!startDate) return false;
      const endDate = addDays(startDate, 6);
      return openMeteoRows.filter((row) => row.date >= startDate && row.date <= endDate && row.h < 24).length >= 7 * 12;
    }

    function updateDayControls() {
      prevDay.disabled = isWeekView() ? !hasOpenMeteoWeek(selectedDayOffset - 1) : !hasOpenMeteoDay(selectedDayOffset - 1);
      todayDay.disabled = selectedDayOffset === 0 && !isWeekView() ? !hasOpenMeteoWeek() : !hasOpenMeteoDay(0);
      nextDay.disabled = isWeekView() ? !hasOpenMeteoWeek(selectedDayOffset + 1) : !hasOpenMeteoDay(selectedDayOffset + 1);
    }

    function mapOpenMeteoRows(payload) {
      const hourly = payload.hourly || {};
      const times = hourly.time || [];
      return times.map((time, index) => {
        const wind = round(hourly.wind_speed_10m?.[index] ?? 0);
        const gust = Math.max(round(hourly.wind_gusts_10m?.[index] ?? wind), wind);
        const weatherCode = hourly.weather_code?.[index] ?? 3;
        return {
          time,
          date: isoDateFromTime(time),
          h: hourFromTime(time),
          actual: round(hourly.temperature_2m?.[index]),
          feels: round(hourly.apparent_temperature?.[index]),
          pop: round(hourly.precipitation_probability?.[index] ?? 0),
          rain: round(hourly.rain?.[index] ?? hourly.precipitation?.[index] ?? 0, 1),
          wind,
          gust,
          humidity: round(hourly.relative_humidity_2m?.[index]),
          visibility: round((hourly.visibility?.[index] ?? 10000) / 1000, 1),
          uv: round(hourly.uv_index?.[index] ?? 0, 1),
          isDay: hourly.is_day?.[index] === 1 ? true : hourly.is_day?.[index] === 0 ? false : undefined,
          weatherCode
        };
      }).filter((row) => Number.isFinite(row.h));
    }

    function mapSunEvents(payload) {
      const daily = payload.daily || {};
      const dates = daily.time || [];
      const sunrise = daily.sunrise || [];
      const sunset = daily.sunset || [];
      return new Map(dates.map((date, index) => {
        const sunriseTime = sunrise[index] || "";
        const sunsetTime = sunset[index] || "";
        return [date, {
          sunrise: sunriseTime,
          sunset: sunsetTime,
          sunriseHour: hourValueFromTime(sunriseTime),
          sunsetHour: hourValueFromTime(sunsetTime),
          solarNoonHour: Number.isFinite(hourValueFromTime(sunriseTime)) && Number.isFinite(hourValueFromTime(sunsetTime))
            ? (hourValueFromTime(sunriseTime) + hourValueFromTime(sunsetTime)) / 2
            : null
        }];
      }));
    }

    function mapAirQualityRows(payload) {
      const hourly = payload?.hourly || {};
      const times = hourly.time || [];
      return times.map((time, index) => {
        const row = { time, date: isoDateFromTime(time), h: hourFromTime(time) };
        airQualityKeys.forEach((key) => {
          const value = hourly[key]?.[index];
          row[key] = Number.isFinite(value) ? round(value, 1) : null;
        });
        return row;
      });
    }

    function mergeAirQualityRows(weatherRows, airPayload) {
      if (!airPayload) return weatherRows;
      const airRowsByTime = new Map(mapAirQualityRows(airPayload).map((row) => [row.time, row]));
      return weatherRows.map((row) => ({
        ...row,
        ...(airRowsByTime.get(row.time) || {})
      }));
    }

    function describeAirQualityAvailability(rows, airPayload, airError = "") {
      if (airError) return "Air-quality request failed; showing weather only.";
      if (!airPayload) return "Air quality not loaded.";

      const availableKeys = airQualityKeys.filter((key) => rows.some((row) => Number.isFinite(row[key])));
      if (!availableKeys.length) return "Air-quality endpoint returned no values for this range/location.";

      const lastAirQualityRow = [...rows]
        .reverse()
        .find((row) => airQualityKeys.some((key) => Number.isFinite(row[key])));
      const pollenAvailable = pollenKeys.some((key) => availableKeys.includes(key));
      const pollenNote = pollenAvailable ? "𖡼 included" : "𖡼 unavailable for this range/location";
      const availabilityNote = lastAirQualityRow
        ? ` Values through ${formatCompactDate(lastAirQualityRow.date)} ${formatHour(lastAirQualityRow.h)}.`
        : "";
      return `Air quality loaded: PM2.5, dust, ${pollenNote}.${availabilityNote}`;
    }

    function yearFromDate(dateString) {
      return Number(dateString.slice(0, 4));
    }

    function sameMonthDayInYear(dateString, year) {
      const [, month, day] = dateString.split("-").map(Number);
      const lastDayOfMonth = new Date(Date.UTC(year, month, 0)).getUTCDate();
      return `${year}-${String(month).padStart(2, "0")}-${String(Math.min(day, lastDayOfMonth)).padStart(2, "0")}`;
    }

    function airQualityHistoryParams(lat, lon, startDate, endDate = startDate) {
      return new URLSearchParams({
        latitude: String(lat),
        longitude: String(lon),
        hourly: airQualityKeys.join(","),
        timezone: "auto",
        start_date: startDate,
        end_date: endDate,
        domains: "cams_europe"
      });
    }

    async function fetchAirQualityWindow(lat, lon, startDate, endDate, signal) {
      const params = airQualityHistoryParams(lat, lon, startDate, endDate);
      const response = await fetch(`https://air-quality-api.open-meteo.com/v1/air-quality?${params}`, { signal });
      if (!response.ok) throw new Error(`Open-Meteo air history returned ${response.status}`);
      const payload = await response.json();
      return mapAirQualityRows(payload).filter((row) => row.date >= startDate && row.date <= endDate && row.h < 24);
    }

    function setAirComparisonLoading() {
      airQualityComparisonState = "loading";
      airQualityComparisons = [];
    }

    function recomputeRangesWithComparisons() {
      const comparisonRows = airQualityComparisons.flatMap((item) => item.rows || []);
      ranges = computeRanges([...openMeteoRows, ...comparisonRows]);
    }

    async function loadAirQualityComparisons(selectedDate) {
      if (!openMeteoLocation || !selectedDate) return;
      const requestId = ++airQualityComparisonRequestId;
      const selectedYear = yearFromDate(selectedDate);
      const currentSummary = summarizeAirQualityWindow(selectedYear, selectedDate, openMeteoRows, true);
      const years = Array.from({ length: comparisonYearsBack }, (_, index) => selectedYear - index - 1)
        .filter((year) => year >= 2013);

      const controller = new AbortController();
      const timeoutId = window.setTimeout(() => controller.abort(), 15000);
      try {
        const results = await Promise.allSettled(years.map(async (year) => {
          const endDate = sameMonthDayInYear(selectedDate, year);
          const startDate = addDays(endDate, -29);
          const rows = await fetchAirQualityWindow(openMeteoLocation.lat, openMeteoLocation.lon, startDate, endDate, controller.signal);
          return summarizeAirQualityWindow(year, endDate, rows, false);
        }));
        if (requestId !== airQualityComparisonRequestId) return;

        const previous = results
          .filter((result) => result.status === "fulfilled" && result.value.rows.length)
          .map((result) => result.value);
        airQualityComparisons = [currentSummary, ...previous];
        airQualityComparisonState = previous.length ? "ready" : "error";
        recomputeRangesWithComparisons();
        render();
      } catch (error) {
        console.warn(error);
        if (requestId !== airQualityComparisonRequestId) return;
        airQualityComparisons = [currentSummary];
        airQualityComparisonState = "error";
        recomputeRangesWithComparisons();
        render();
      } finally {
        window.clearTimeout(timeoutId);
      }
    }

    function applySelectedOpenMeteoDay() {
      chartMode = "day";
      const selectedDate = selectedOpenMeteoDate();
      const nextDate = addDays(selectedDate, 1);
      const dayRows = openMeteoRows.filter((row) => row.date === selectedDate && row.h < 24).slice(0, 24);
      const nextMidnight = openMeteoRows.find((row) => row.date === nextDate && row.h === 0);

      if (dayRows.length < 12) throw new Error(`Open-Meteo did not return enough rows for ${selectedDate}.`);
      forecast = dayRows.map((row) => ({ ...row }));
      forecast.push(nextMidnight ? { ...nextMidnight, h: 24 } : { ...forecast[forecast.length - 1], h: 24 });
      ranges = computeRanges(openMeteoRows);

      selectedHour = clamp(selectedHour, 0, 24);
      const selectedWeather = forecast.find((row) => row.h === selectedHour) || forecast[0];
      const chipWeather = selectedDayOffset === 0
        ? {
            actual: round(openMeteoCurrent.temperature_2m ?? selectedWeather.actual),
            feels: round(openMeteoCurrent.apparent_temperature ?? selectedWeather.feels),
            weatherCode: openMeteoCurrent.weather_code ?? selectedWeather.weatherCode
          }
        : selectedWeather;
      currentWeather = {
        actual: chipWeather.actual,
        feels: chipWeather.feels,
        weatherCode: chipWeather.weatherCode,
        description: conditionDescription(chipWeather.weatherCode)
      };

      setStatus(`Live Open-Meteo data for ${openMeteoLocation.lat.toFixed(4)}, ${openMeteoLocation.lon.toFixed(4)}. Showing ${dayOffsetLabel(selectedDayOffset)} (${selectedDate}). Normalized against returned hourly range. ${openMeteoAirQualityNote}`);
      setAirComparisonLoading();
      render();
      loadAirQualityComparisons(selectedDate);
    }

    function applyWeekView(offset = selectedDayOffset, options = {}) {
      if (!hasOpenMeteoWeek(offset)) return false;

      const previousHour = selectedHour;
      chartMode = "week";
      selectedDayOffset = offset;
      activeMetric = null;
      hoverMetric = null;
      suppressedHoverMetric = null;

      const startDate = selectedOpenMeteoDate();
      const endDate = addDays(startDate, 6);
      const nextDate = addDays(startDate, 7);
      const weekRows = openMeteoRows
        .filter((row) => row.date >= startDate && row.date <= endDate && row.h < 24)
        .map((row) => ({ ...row, h: chartHourForDate(row.date, row.h, startDate) }))
        .sort((a, b) => a.h - b.h);
      const nextMidnight = openMeteoRows.find((row) => row.date === nextDate && row.h === 0);
      if (nextMidnight) {
        weekRows.push({ ...nextMidnight, h: 24 * 7 });
      } else if (weekRows.length) {
        weekRows.push({ ...weekRows[weekRows.length - 1], h: 24 * 7 });
      }

      forecast = weekRows;
      ranges = computeRanges(openMeteoRows);
      const currentHour = hourValueFromTime(openMeteoCurrentTime);
      const shouldUseCurrentHour = options.preserveSelectedHour === false && selectedDayOffset === 0 && Number.isFinite(currentHour);
      selectedHour = clamp(shouldUseCurrentHour ? currentHour : previousHour, 0, chartDomainHours());

      const selectedWeather = dataForHour(selectedHour);
      const useCurrentWeather = selectedDayOffset === 0 && Number.isFinite(currentHour) && Math.abs(selectedHour - currentHour) < 0.51;
      const chipWeather = useCurrentWeather
        ? {
            actual: round(openMeteoCurrent.temperature_2m ?? selectedWeather.actual),
            feels: round(openMeteoCurrent.apparent_temperature ?? selectedWeather.feels),
            weatherCode: openMeteoCurrent.weather_code ?? selectedWeather.weatherCode
          }
        : selectedWeather;
      currentWeather = {
        actual: chipWeather.actual,
        feels: chipWeather.feels,
        weatherCode: chipWeather.weatherCode,
        description: conditionDescription(chipWeather.weatherCode)
      };

      airQualityComparisonRequestId += 1;
      airQualityComparisons = [];
      airQualityComparisonState = "idle";
      setStatus(`Live Open-Meteo data for ${openMeteoLocation.lat.toFixed(4)}, ${openMeteoLocation.lon.toFixed(4)}. Showing ${formatWeekRangeLabel()}. Normalized against returned hourly range. ${openMeteoAirQualityNote}`);
      render();
      return true;
    }

    function applyTodayWeekView() {
      return applyWeekView(0, { preserveSelectedHour: false });
    }

    function setSelectedDayOffset(offset, options = {}) {
      if ((options.mode || chartMode) === "week") {
        return applyWeekView(offset, { preserveSelectedHour: true });
      }
      if (!hasOpenMeteoDay(offset)) return false;
      selectedDayOffset = offset;
      applySelectedOpenMeteoDay();
      return true;
    }

    function applyOpenMeteo(payload, lat, lon, airPayload = null, airError = "") {
      const rows = mergeAirQualityRows(mapOpenMeteoRows(payload), airPayload);
      if (!rows.length) throw new Error("Open-Meteo returned no hourly rows.");

      openMeteoRows = rows;
      openMeteoCurrent = payload.current || {};
      openMeteoCurrentTime = openMeteoCurrent.time || rows.find((row) => row.date === isoDateFromTime(new Date().toISOString()))?.time || rows[0].time;
      openMeteoReferenceDate = isoDateFromTime(openMeteoCurrentTime);
      openMeteoLocation = { lat, lon, name: inferLocationName(lat, lon) };
      openMeteoAirQualityNote = describeAirQualityAvailability(rows, airPayload, airError);
      sunEventsByDate = mapSunEvents(payload);
      selectedDayOffset = 0;
      selectedHour = clamp(Number.isFinite(hourFromTime(openMeteoCurrentTime)) ? hourFromTime(openMeteoCurrentTime) : selectedHour, 0, 24);
      localStorage.setItem("weatherLat", String(lat));
      localStorage.setItem("weatherLon", String(lon));
      applySelectedOpenMeteoDay();
    }

    async function loadOpenMeteo() {
      const lat = Number(latitudeInput.value);
      const lon = Number(longitudeInput.value);
      if (!Number.isFinite(lat) || !Number.isFinite(lon)) {
        setStatus("Enter valid latitude and longitude.");
        return;
      }

      loadWeather.disabled = true;
      setStatus("Loading Open-Meteo weather and air-quality history...");
      const hourly = [
        "temperature_2m",
        "apparent_temperature",
        "precipitation_probability",
        "precipitation",
        "rain",
        "relative_humidity_2m",
        "weather_code",
        "is_day",
        "visibility",
        "wind_speed_10m",
        "wind_gusts_10m",
        "uv_index"
      ].join(",");
      const current = [
        "temperature_2m",
        "apparent_temperature",
        "weather_code",
        "wind_speed_10m",
        "wind_gusts_10m",
        "relative_humidity_2m",
        "precipitation",
        "rain"
      ].join(",");
      const airHourly = airQualityKeys.join(",");
      const params = new URLSearchParams({
        latitude: String(lat),
        longitude: String(lon),
        hourly,
        current,
        daily: "sunrise,sunset",
        timezone: "auto",
        past_days: "30",
        forecast_days: "8",
        temperature_unit: "celsius",
        wind_speed_unit: "kmh",
        precipitation_unit: "mm"
      });
      const airParams = new URLSearchParams({
        latitude: String(lat),
        longitude: String(lon),
        hourly: airHourly,
        current: airHourly,
        timezone: "auto",
        past_days: "30",
        forecast_days: "7",
        domains: "cams_europe"
      });

      const controller = new AbortController();
      const timeoutId = window.setTimeout(() => controller.abort(), 12000);
      try {
        const weatherRequest = fetch(`https://api.open-meteo.com/v1/forecast?${params}`, { signal: controller.signal }).then((response) => {
          if (!response.ok) throw new Error(`Open-Meteo weather returned ${response.status}`);
          return response.json();
        });
        const airRequest = fetch(`https://air-quality-api.open-meteo.com/v1/air-quality?${airParams}`, { signal: controller.signal }).then((response) => {
          if (!response.ok) throw new Error(`Open-Meteo air quality returned ${response.status}`);
          return response.json();
        });
        const [weatherResult, airResult] = await Promise.allSettled([weatherRequest, airRequest]);
        if (weatherResult.status !== "fulfilled") throw weatherResult.reason;
        const airPayload = airResult.status === "fulfilled" ? airResult.value : null;
        const airError = airResult.status === "rejected" ? airResult.reason?.message || "Air-quality request failed" : "";
        applyOpenMeteo(weatherResult.value, lat, lon, airPayload, airError);
      } catch (error) {
        console.warn(error);
        forecast = sampleForecast.map((d) => ({ ...d }));
        ranges = computeRanges(sampleForecast);
        openMeteoRows = [];
        openMeteoCurrent = {};
        openMeteoCurrentTime = "";
        openMeteoReferenceDate = "";
        openMeteoLocation = null;
        openMeteoAirQualityNote = "Air quality not loaded.";
        sunEventsByDate = new Map();
        airQualityComparisonRequestId += 1;
        airQualityComparisonState = "idle";
        airQualityComparisons = [];
        chartMode = "day";
        selectedDayOffset = 0;
        currentWeather = { actual: 23, feels: 23, weatherCode: 2, description: "sample conditions" };
        selectedHour = 18;
        setStatus("Could not load Open-Meteo. Showing sample data.");
        render();
      } finally {
        window.clearTimeout(timeoutId);
        loadWeather.disabled = false;
      }
    }

    function restoreSavedCoordinates() {
      const savedLat = localStorage.getItem("weatherLat");
      const savedLon = localStorage.getItem("weatherLon");
      if (savedLat) latitudeInput.value = savedLat;
      if (savedLon) longitudeInput.value = savedLon;
    }

    function isPageSwipeIgnoredTarget(target) {
      return Boolean(target.closest?.("button, input, textarea, select, label, a, [role='button'], [contenteditable='true']"));
    }

    function pageSwipeThreshold(startedOnChart) {
      const viewportThreshold = Math.max(pageSwipeGestureThreshold, window.innerWidth * 0.12);
      return Math.min(128, viewportThreshold) + (startedOnChart ? chartSwipeExtraThreshold : 0);
    }

    function beginPageSwipe(event) {
      if (event.isPrimary === false || event.pointerType === "mouse") return;
      if (isPageSwipeIgnoredTarget(event.target)) return;
      pageSwipeGesture = {
        pointerId: event.pointerId,
        startX: event.clientX,
        startY: event.clientY,
        startedOnChart: Boolean(event.target.closest?.(".chart-wrap")),
        cancelled: false
      };
    }

    function updatePageSwipe(event) {
      if (!pageSwipeGesture || pageSwipeGesture.pointerId !== event.pointerId) return;
      const dx = event.clientX - pageSwipeGesture.startX;
      const dy = event.clientY - pageSwipeGesture.startY;
      const absX = Math.abs(dx);
      const absY = Math.abs(dy);
      if (Math.max(absX, absY) < scrubberGestureThreshold) return;
      if (absY > absX * pageSwipeAxisRatio) pageSwipeGesture.cancelled = true;
    }

    function finishPageSwipe(event) {
      if (!pageSwipeGesture || pageSwipeGesture.pointerId !== event.pointerId) return;
      const gesture = pageSwipeGesture;
      pageSwipeGesture = null;

      const dx = event.clientX - gesture.startX;
      const dy = event.clientY - gesture.startY;
      const absX = Math.abs(dx);
      const absY = Math.abs(dy);
      if (gesture.cancelled || absX < pageSwipeThreshold(gesture.startedOnChart) || absX < absY * pageSwipeAxisRatio) return;

      setSelectedDayOffset(selectedDayOffset + (dx < 0 ? 1 : -1));
    }

    function cancelPageSwipe(event) {
      if (!pageSwipeGesture || pageSwipeGesture.pointerId !== event.pointerId) return;
      pageSwipeGesture = null;
    }

    function chartPinchPoints() {
      return [...chartPinchPointers.values()].slice(0, 2);
    }

    function resetChartPinchGesture() {
      const points = chartPinchPoints();
      if (points.length < 2) {
        chartPinchGesture = null;
        return;
      }
      chartPinchGesture = {
        initialX: Math.abs(points[0].x - points[1].x),
        initialY: Math.abs(points[0].y - points[1].y),
        triggered: false
      };
      cancelChartLongPress();
      chartGesture = null;
      setScrubberVisible(false);
      unlockChartScroll();
    }

    function beginChartPinch(event) {
      if (event.pointerType === "mouse") return false;
      chartPinchPointers.set(event.pointerId, { x: event.clientX, y: event.clientY });
      if (chartPinchPointers.size < 2) return false;
      resetChartPinchGesture();
      return true;
    }

    function updateChartPinch(event) {
      if (!chartPinchPointers.has(event.pointerId)) return false;
      chartPinchPointers.set(event.pointerId, { x: event.clientX, y: event.clientY });
      if (chartPinchPointers.size < 2) return false;
      if (!chartPinchGesture) resetChartPinchGesture();
      if (!chartPinchGesture) return false;

      const points = chartPinchPoints();
      const currentX = Math.abs(points[0].x - points[1].x);
      const currentY = Math.abs(points[0].y - points[1].y);
      const horizontalPinch = chartPinchGesture.initialX - currentX;
      const horizontalZoom = Math.abs(horizontalPinch);
      const verticalChange = Math.abs(chartPinchGesture.initialY - currentY);
      const startedOnHorizontalAxis = chartPinchGesture.initialX > chartPinchGesture.initialY * chartPinchAxisRatio;
      const zoomedOnXAxis = horizontalZoom >= chartPinchReturnThreshold && horizontalZoom > verticalChange * chartPinchAxisRatio;
      const pinchedInOnXAxis = horizontalPinch >= chartPinchReturnThreshold && horizontalPinch > verticalChange * chartPinchAxisRatio;

      if (!chartPinchGesture.triggered && !isWeekView() && startedOnHorizontalAxis && zoomedOnXAxis) {
        chartPinchGesture.triggered = true;
        chartPinchPointers.clear();
        applyWeekView(selectedDayOffset, { preserveSelectedHour: true });
      } else if (!chartPinchGesture.triggered && isWeekView() && startedOnHorizontalAxis && pinchedInOnXAxis) {
        chartPinchGesture.triggered = true;
        chartPinchPointers.clear();
        setSelectedDayOffset(0, { mode: "day" });
      }
      return true;
    }

    function endChartPinch(event) {
      chartPinchPointers.delete(event.pointerId);
      if (chartPinchPointers.size < 2) chartPinchGesture = null;
    }

    document.addEventListener("pointerdown", beginPageSwipe);
    document.addEventListener("pointermove", updatePageSwipe);
    document.addEventListener("pointerup", finishPageSwipe);
    document.addEventListener("pointercancel", cancelPageSwipe);
    document.addEventListener("touchmove", preventTouchScrollWhileScrubbing, { passive: false });
    document.addEventListener("touchend", unlockChartScroll, { passive: true });
    document.addEventListener("touchcancel", unlockChartScroll, { passive: true });

    chartWrap.addEventListener("pointerdown", (event) => {
      if (event.pointerType === "mouse" && event.button !== 0) return;
      if (beginChartPinch(event)) return;
      if (event.isPrimary === false) return;
      clearScrubberHideTimer();

      chartGesture = {
        pointerId: event.pointerId,
        pointerType: event.pointerType,
        startX: event.clientX,
        startY: event.clientY,
        active: event.pointerType === "mouse"
      };

      beginChartLongPress(event);
      if (event.pointerType === "mouse") activateChartScrub(event);
    });

    chartWrap.addEventListener("pointermove", (event) => {
      if (updateChartPinch(event)) return;
      if (event.pointerType === "mouse") {
        if (event.buttons & 1) activateChartScrub(event);
        return;
      }

      if (!chartGesture || chartGesture.pointerId !== event.pointerId) return;

      const dx = event.clientX - chartGesture.startX;
      const dy = event.clientY - chartGesture.startY;
      const absX = Math.abs(dx);
      const absY = Math.abs(dy);

      updateChartLongPress(event);
      if (!chartGesture.active) {
        if (Math.max(absX, absY) > chartLongPressMoveTolerance) {
          cancelChartLongPress(event.pointerId);
          chartGesture = null;
        }
        return;
      }

      activateChartScrub(event);
    });

    chartWrap.addEventListener("pointerup", (event) => {
      cancelChartLongPress(event.pointerId);
      endChartPinch(event);
      const wasChartGesture = chartGesture && chartGesture.pointerId === event.pointerId;
      const wasActiveScrub = wasChartGesture && chartGesture.active;

      setScrubberVisible(false);

      releaseChartPointer(event);
      unlockChartScroll();
      if (wasChartGesture) chartGesture = null;
    });

    chartWrap.addEventListener("pointercancel", (event) => {
      cancelChartLongPress(event.pointerId);
      endChartPinch(event);
      releaseChartPointer(event);
      if (chartGesture && chartGesture.pointerId === event.pointerId) chartGesture = null;
      setScrubberVisible(false);
      unlockChartScroll();
    });

    chartWrap.addEventListener("lostpointercapture", (event) => {
      cancelChartLongPress(event.pointerId);
      endChartPinch(event);
      if (chartGesture && chartGesture.pointerId === event.pointerId) chartGesture = null;
      setScrubberVisible(false);
      unlockChartScroll();
    });

    chartWrap.addEventListener("contextmenu", (event) => event.preventDefault());

    prevDay.addEventListener("click", () => setSelectedDayOffset(selectedDayOffset - 1));
    todayDay.addEventListener("click", () => {
      if (isWeekView()) {
        setSelectedDayOffset(0, { mode: "day" });
        return;
      }
      if (selectedDayOffset !== 0) {
        setSelectedDayOffset(0);
        return;
      }
      applyTodayWeekView();
    });
    nextDay.addEventListener("click", () => setSelectedDayOffset(selectedDayOffset + 1));
    settingsButton.addEventListener("click", () => {
      const willOpen = settingsPanel.hidden;
      settingsPanel.hidden = !willOpen;
      settingsButton.setAttribute("aria-expanded", String(willOpen));
    });
    dataForm.addEventListener("submit", (event) => {
      event.preventDefault();
      loadOpenMeteo();
    });
    legend.addEventListener("pointerover", (event) => {
      const metric = legendMetricFromEvent(event);
      if (!metric || activeMetric) return;
      if (suppressedHoverMetric && suppressedHoverMetric !== metric) suppressedHoverMetric = null;
      if (suppressedHoverMetric === metric) return;
      setHoverFocus(metric);
    });
    legend.addEventListener("pointermove", (event) => {
      const metric = legendMetricFromEvent(event);
      if (!metric || activeMetric) return;
      if (suppressedHoverMetric && suppressedHoverMetric !== metric) suppressedHoverMetric = null;
      if (suppressedHoverMetric === metric) return;
      setHoverFocus(metric);
    });
    legend.addEventListener("pointerleave", () => {
      suppressedHoverMetric = null;
      setHoverFocus(null);
    });
    document.addEventListener("keydown", (event) => {
      if (event.key === "ArrowLeft") setSelectedHour(selectedHour - 1);
      if (event.key === "ArrowRight") setSelectedHour(selectedHour + 1);
      if (event.key === "Escape") {
        activeMetric = null;
        hoverMetric = null;
        suppressedHoverMetric = null;
        render();
      }
    });
    window.addEventListener("resize", () => {
      window.clearTimeout(resizeTimer);
      resizeTimer = window.setTimeout(render, 80);
    });

    restoreSavedCoordinates();
    render();
    loadOpenMeteo();
  </script>
</body>
</html>
