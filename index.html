<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Weather</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0e1014;
      --panel: #171a20;
      --panel-2: #20242b;
      --grid: rgba(255, 255, 255, 0.13);
      --grid-strong: rgba(255, 255, 255, 0.22);
      --text: #f4f7fb;
      --muted: #a6abb6;
      --muted-2: #747b88;
      --actual: #ffd15c;
      --feels: #ff7a3d;
      --rain: #35c8ff;
      --wind: #10d2b8;
      --humidity: #4d9dff;
      --visibility: #eef1f7;
      --uv: #b66cff;
      --focus: #ffffff;
      --shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      background:
        radial-gradient(circle at 18% 8%, rgba(255, 194, 92, 0.15), transparent 28%),
        radial-gradient(circle at 82% 0%, rgba(53, 200, 255, 0.13), transparent 30%),
        linear-gradient(145deg, #11151b 0%, #0e1014 44%, #19191f 100%);
      color: var(--text);
    }

    body.is-chart-scrubbing {
      position: fixed;
      top: var(--chart-scroll-lock-top, 0);
      left: 0;
      right: 0;
      width: 100%;
      overflow: hidden;
    }

    .page {
      width: min(1180px, 100%);
      margin: 0 auto;
      padding: 16px clamp(14px, 3vw, 32px) calc(36px + env(safe-area-inset-bottom));
    }

    .weather-view {
      display: grid;
      gap: 12px;
      touch-action: pan-y;
    }

    [hidden] {
      display: none !important;
    }

    .topbar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: start;
      gap: 12px;
    }

    .location-title {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px;
      margin: 0;
      font-size: clamp(22px, 4vw, 34px);
      line-height: 1.08;
      font-weight: 850;
      overflow-wrap: anywhere;
    }

    .title-separator {
      color: var(--muted-2);
    }

    .date-switcher {
      display: inline-flex;
      align-items: center;
      gap: 2px;
      white-space: nowrap;
    }

    .title-arrow,
    .title-date {
      display: inline-grid;
      place-items: center;
      border: 0;
      background: transparent;
      color: var(--text);
      cursor: pointer;
      font: inherit;
      line-height: 1;
      padding: 0;
    }

    .title-arrow {
      width: 30px;
      height: 30px;
      border-radius: 8px;
      color: var(--muted);
    }

    .title-arrow:hover:not(:disabled),
    .title-arrow:focus-visible,
    .title-date:hover:not(:disabled),
    .title-date:focus-visible {
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      outline: none;
    }

    .title-arrow:focus-visible,
    .title-date:focus-visible {
      outline: 2px solid var(--focus);
      outline-offset: 2px;
    }

    .title-arrow:disabled,
    .title-date:disabled {
      cursor: default;
    }

    .title-arrow:disabled {
      opacity: 0.42;
    }

    .title-date {
      border-radius: 8px;
      padding: 2px 4px 4px;
      text-align: center;
    }

    .title-arrow svg {
      width: 24px;
      height: 24px;
      stroke: currentColor;
      stroke-width: 2.4;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .current-chip {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
      max-width: 100%;
      margin-top: 7px;
    }

    .weather-icon {
      position: relative;
      flex: 0 0 auto;
      width: 34px;
      height: 34px;
    }

    .weather-icon::before {
      content: "";
      position: absolute;
      width: 23px;
      height: 23px;
      border-radius: 50%;
      background: #ffd15c;
      left: 2px;
      top: 2px;
      box-shadow: 0 0 24px rgba(255, 209, 92, 0.46);
    }

    .weather-icon::after {
      content: "";
      position: absolute;
      width: 25px;
      height: 13px;
      left: 10px;
      bottom: 7px;
      border-radius: 18px;
      background: #edf2f7;
      box-shadow: -10px 1px 0 -2px #edf2f7, 7px -7px 0 -5px #edf2f7;
    }

    .current-copy {
      display: flex;
      align-items: baseline;
      gap: 8px;
      min-width: 0;
      flex-wrap: nowrap;
      color: var(--muted);
      font-size: 16px;
      overflow: hidden;
    }

    .current-copy b {
      flex: 0 0 auto;
      color: var(--text);
      font-size: 22px;
      line-height: 1;
      white-space: nowrap;
    }

    #currentDesc {
      flex: 0 0 auto;
      white-space: nowrap;
    }

    .outlier-summary {
      min-width: 0;
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .outlier-summary::before {
      content: "·";
      margin-right: 8px;
      color: var(--muted-2);
    }

    .outlier-summary[hidden] {
      display: none;
    }

    .settings-button {
      margin-top: 1px;
      background: rgba(255, 255, 255, 0.08);
    }

    .settings-panel {
      display: grid;
      gap: 8px;
      padding: 10px;
      border: 1px solid rgba(255, 255, 255, 0.09);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.045);
    }

    .settings-panel[hidden] {
      display: none;
    }

    .data-panel {
      display: grid;
      grid-template-columns: 140px 140px auto 1fr;
      gap: 8px;
      align-items: end;
      padding: 0;
      border: 0;
      border-radius: 0;
      background: transparent;
    }

    .field {
      display: grid;
      gap: 5px;
      min-width: 0;
    }

    .field span {
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
    }

    .field input {
      width: 100%;
      min-width: 0;
      height: 38px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 8px;
      background: rgba(8, 10, 14, 0.64);
      color: var(--text);
      font: inherit;
      font-size: 14px;
      outline: none;
      padding: 0 10px;
    }

    .field input:focus {
      border-color: rgba(255, 255, 255, 0.42);
    }

    .load-button {
      height: 38px;
      min-width: 94px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.12);
      color: var(--text);
      cursor: pointer;
      font: inherit;
      font-size: 14px;
      font-weight: 800;
    }

    .load-button:disabled {
      color: var(--muted-2);
      cursor: progress;
    }

    .data-status {
      min-height: 18px;
      color: var(--muted-2);
      font-size: 12px;
      grid-column: 1 / -1;
      overflow-wrap: anywhere;
    }

    .chart-panel {
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      background: linear-gradient(180deg, rgba(32, 36, 43, 0.96), rgba(18, 20, 25, 0.98));
      box-shadow: var(--shadow);
    }

    .readout-time {
      display: flex;
      align-items: baseline;
      gap: 10px;
      min-width: 0;
      flex-wrap: wrap;
    }

    .readout-time strong {
      font-size: clamp(28px, 4.5vw, 48px);
      line-height: 1;
    }

    .readout-time span {
      color: var(--muted);
      font-size: 15px;
      white-space: nowrap;
    }

    .readout-time .readout-date {
      color: var(--text);
      font-size: 14px;
      font-weight: 800;
    }

    .normalization-note {
      margin: 7px 0 0;
      color: var(--muted-2);
      font-size: 13px;
    }

    .chart-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .icon-button {
      display: inline-grid;
      place-items: center;
      width: 38px;
      height: 38px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.07);
      color: var(--text);
      cursor: pointer;
    }

    .icon-button:disabled {
      color: var(--muted-2);
      cursor: not-allowed;
      opacity: 0.42;
    }

    .icon-button svg {
      width: 20px;
      height: 20px;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .icon-button svg .filled {
      fill: currentColor;
      stroke: none;
    }

    .icon-button:focus-visible,
    .trend-item:focus-visible {
      outline: 2px solid var(--focus);
      outline-offset: 2px;
    }

    .chart-wrap {
      position: relative;
      padding: 10px 0 6px;
      touch-action: pan-y;
      user-select: none;
      -webkit-touch-callout: none;
      -webkit-tap-highlight-color: transparent;
      -webkit-user-select: none;
    }

    #weatherChart {
      display: block;
      width: 100%;
      height: min(58vh, 560px);
      min-height: 420px;
      user-select: none;
      -webkit-user-select: none;
    }

    #weatherChart * {
      user-select: none;
      -webkit-user-select: none;
    }

    body.is-chart-scrubbing .chart-wrap {
      touch-action: none;
    }

    .axis-label {
      fill: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .axis-label.temp-axis {
      font-size: 13px;
      font-weight: 850;
    }

    .axis-label.temp-axis-period {
      opacity: 0.3;
    }

    .axis-label.temp-axis-daily {
      opacity: 1;
    }

    .axis-label.rain-axis {
      fill: var(--rain);
    }

    .axis-label.wind-axis {
      fill: var(--wind);
    }

    .axis-label.right-axis-unit {
      font-size: 9px;
      font-weight: 800;
    }

    .compact-wind-unit text {
      fill: var(--wind);
      font-size: 7px;
      font-weight: 850;
    }

    .compact-wind-unit line {
      stroke: var(--wind);
      stroke-width: 1.1;
      stroke-linecap: round;
    }

    .axis-label.uv-axis-mark {
      fill: var(--uv);
      font-size: 10px;
      font-weight: 850;
    }

    .axis-label.uv-axis-crossing {
      dominant-baseline: central;
      font-size: 12px;
    }

    .axis-label.week-day-summary {
      font-size: 9px;
      font-weight: 850;
      opacity: 0.82;
    }

    .axis-label.low {
      dominant-baseline: ideographic;
    }

    .grid-line {
      stroke: var(--grid);
      stroke-width: 1;
    }

    .grid-line.strong {
      stroke: var(--grid-strong);
    }

    .series {
      transition: opacity 160ms ease, filter 160ms ease;
    }

    .series.dimmed {
      opacity: 0.18;
    }

    .series.highlighted {
      opacity: 1;
      filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.23));
    }

    .line {
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .scrubber-line {
      stroke: rgba(255, 255, 255, 0.07);
      stroke-width: 1;
      filter: drop-shadow(0 0 4px rgba(255, 255, 255, 0.46)) drop-shadow(0 0 2px rgba(0, 0, 0, 0.72));
    }

    .scrubber-dot {
      fill: var(--dot, #ffffff);
      stroke: rgba(9, 11, 16, 0.5);
      stroke-width: 0.8;
    }

    .details {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 18px;
    }

    .details.is-week-view {
      grid-template-columns: 1fr;
    }

    .info-panel {
      border: 1px solid rgba(255, 255, 255, 0.09);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.055);
      padding: 16px;
    }

    .info-panel h2 {
      margin: 0 0 10px;
      font-size: 18px;
    }

    .info-panel p {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
    }

    .event-list {
      display: grid;
      gap: 9px;
    }

    .trend-grid {
      display: grid;
      grid-template-columns: repeat(var(--trend-columns, 3), minmax(0, 1fr));
      gap: 6px;
    }

    .trend-item {
      display: grid;
      grid-template-rows: auto auto;
      gap: 2px;
      align-content: center;
      min-width: 0;
      height: 54px;
      padding: 5px 6px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.055);
      color: var(--muted);
      cursor: pointer;
      font: inherit;
      text-align: left;
    }

    .trend-item[aria-pressed="true"] {
      border-color: color-mix(in srgb, var(--trend-color) 52%, rgba(255, 255, 255, 0.28));
      background: color-mix(in srgb, var(--trend-color) 13%, rgba(255, 255, 255, 0.08));
    }

    .trend-top {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 5px;
      align-items: center;
      min-width: 0;
    }

    .trend-label,
    .trend-value,
    .trend-number,
    .trend-unit {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .trend-label {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 18px;
      min-width: 0;
      height: 18px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 500;
    }

    .trend-label-text {
      display: none;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .trend-icon {
      display: block;
      width: 18px;
      height: 18px;
      color: rgba(244, 247, 251, 0.9);
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .trend-item.is-focused .trend-label,
    .trend-item:focus-visible .trend-label {
      justify-content: flex-start;
      width: auto;
    }

    .trend-item.is-focused .trend-icon,
    .trend-item:focus-visible .trend-icon {
      display: none;
    }

    .trend-item.is-focused .trend-label-text,
    .trend-item:focus-visible .trend-label-text {
      display: block;
    }

    .trend-value {
      display: flex;
      justify-content: flex-end;
      align-items: baseline;
      gap: 3px;
      max-width: 72px;
      color: var(--text);
      text-align: right;
    }

    .trend-number {
      color: var(--text);
      font-size: 13px;
      font-weight: 850;
      text-align: right;
    }

    .trend-unit {
      color: var(--muted-2);
      font-size: 10px;
      font-weight: 750;
      text-align: left;
    }

    .aq-history-range {
      position: relative;
      display: block;
      width: 100%;
      height: 22px;
      min-width: 0;
    }

    .aq-range-number {
      position: absolute;
      z-index: 1;
      top: 12px;
      max-width: 44%;
      color: var(--muted);
      font-size: 9px;
      font-weight: 800;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .aq-range-number:first-child {
      left: 0;
      text-align: left;
    }

    .aq-range-number:last-child {
      right: 0;
      text-align: right;
    }

    .aq-range-line {
      position: absolute;
      left: 0;
      right: 0;
      top: 0;
      height: 12px;
      min-width: 0;
    }

    .aq-range-line::before {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      top: 4px;
      height: 4px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.055);
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.24),
        0 1px 4px rgba(0, 0, 0, 0.72),
        inset 0 0 0 1px rgba(0, 0, 0, 0.28);
    }

    .aq-range-recent-outline {
      position: absolute;
      left: var(--recent-outline-start);
      width: var(--recent-outline-width);
      top: 3px;
      height: 1px;
      border-radius: 999px;
      background: var(--aq-color);
      opacity: 0.5;
      box-shadow: 0 5px 0 var(--aq-color);
      pointer-events: none;
    }

    .aq-range-point {
      position: absolute;
      left: var(--point-pos);
      top: 3px;
      width: 4px;
      height: 6px;
      border-radius: 999px;
      background: var(--aq-color);
      opacity: var(--point-opacity);
      transform: translateX(-50%);
      pointer-events: none;
    }

    .aq-range-marker {
      position: absolute;
      left: var(--pos);
      top: 0;
      width: 8px;
      height: 12px;
      display: grid;
      place-items: center;
      transform: translateX(-50%);
      pointer-events: none;
    }

    .aq-range-marker::before {
      content: "";
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.96);
    }

    .aq-range-marker[data-trend="rising"]::before,
    .aq-range-marker[data-trend="falling"]::before {
      display: grid;
      place-items: center;
      width: auto;
      height: 12px;
      border-radius: 0;
      background: transparent;
      color: rgba(255, 255, 255, 0.96);
      font-size: 10px;
      font-weight: 950;
      line-height: 12px;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.72);
    }

    .aq-range-marker[data-trend="rising"]::before {
      content: ">";
    }

    .aq-range-marker[data-trend="falling"]::before {
      content: "<";
    }

    .event-row {
      display: grid;
      grid-template-columns: 50px auto minmax(0, 1fr) auto;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      font-size: 14px;
    }

    .event-row span,
    .event-row strong {
      min-width: 0;
      overflow-wrap: anywhere;
    }

    .event-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--dot);
    }

    .event-time {
      color: var(--text);
      font-weight: 850;
      white-space: nowrap;
    }

    .event-row strong {
      color: var(--text);
      font-size: 14px;
      text-align: right;
    }

    .event-row strong:empty {
      display: none;
    }

    @media (max-width: 860px) {
      .topbar {
        grid-template-columns: minmax(0, 1fr) auto;
      }

      .data-panel {
        grid-template-columns: 1fr 1fr;
      }

      .data-panel .field:first-child,
      .data-panel .data-status {
        grid-column: 1 / -1;
      }

      .details {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 560px) {
      .page {
        padding: 12px 10px calc(28px + env(safe-area-inset-bottom));
      }

      .location-title {
        font-size: 22px;
      }

      .current-chip {
        gap: 8px;
      }

      .current-copy {
        gap: 6px;
        font-size: 14px;
      }

      .current-copy b {
        font-size: 20px;
      }

      .data-panel {
        grid-template-columns: 1fr;
      }

      .data-panel .field,
      .data-panel .field:first-child,
      .data-panel .data-status {
        grid-column: auto;
      }

      #weatherChart {
        height: min(62vh, 520px);
        min-height: 410px;
      }

      .readout-time {
        display: grid;
        gap: 4px;
      }

      .readout-time span {
        white-space: normal;
      }

      .trend-grid {
        gap: 6px;
      }

      .trend-item {
        height: 54px;
        padding: 5px;
      }

      .trend-top {
        gap: 4px;
      }

      .trend-panel h2 {
        display: none;
      }

      .info-panel {
        padding: 12px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="weather-view" aria-label="Unified weather chart prototype">
      <header class="topbar">
        <div class="location-summary">
          <h1 class="location-title">
            <span id="currentCity">Prague</span>
            <span class="title-separator">·</span>
            <span class="date-switcher">
              <button class="title-arrow" id="prevDay" type="button" aria-label="Previous day">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15 18l-6-6 6-6"></path></svg>
              </button>
              <button class="title-date" id="todayDay" type="button" aria-label="Today" title="Today">
                <span id="currentDateLabel">Today</span>
              </button>
              <button class="title-arrow" id="nextDay" type="button" aria-label="Next day">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9 6l6 6-6 6"></path></svg>
              </button>
            </span>
          </h1>
          <div class="current-chip" aria-label="Current weather">
            <span class="weather-icon" aria-hidden="true"></span>
            <span class="current-copy">
              <b id="currentTemp">23&deg;C</b>
              <span id="currentDesc">partly cloudy</span>
              <span class="outlier-summary" id="outlierSummary" hidden></span>
            </span>
          </div>
        </div>
        <button class="icon-button settings-button" id="settingsButton" type="button" aria-label="Settings" aria-expanded="false" aria-controls="settingsPanel">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Z"></path>

    function configureLayout() {
      const bounds = svg.getBoundingClientRect();

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function round(value, places = 0) {
      if (!Number.isFinite(value)) return 0;
      const factor = 10 ** places;
      return Math.round(value * factor) / factor;
    }

    function hexToRgb(hex) {
      const clean = hex.replace("#", "");
      return {
        r: parseInt(clean.slice(0, 2), 16),
        g: parseInt(clean.slice(2, 4), 16),
        b: parseInt(clean.slice(4, 6), 16)
      };
    }

    function rgbToHex({ r, g, b }) {
      return `#${[r, g, b].map((channel) => clamp(Math.round(channel), 0, 255).toString(16).padStart(2, "0")).join("")}`;
    }

    function mixColor(a, b, ratio) {
      const from = hexToRgb(a);
      const to = hexToRgb(b);
      return rgbToHex({
        r: from.r + (to.r - from.r) * ratio,
        g: from.g + (to.g - from.g) * ratio,
        b: from.b + (to.b - from.b) * ratio
      });
    }

    function tempColor(value) {
      const stops = [
        { value: -10, color: "#58a6ff" },
        { value: 0, color: "#38bdf8" },
        { value: 8, color: "#2dd4bf" },
        { value: 16, color: "#8bcf51" },
        { value: 22, color: "#ffd84d" },
        { value: 28, color: "#ff9f2f" },
        { value: 34, color: "#ff6536" },
        { value: 40, color: "#d84d75" }
      ];
      if (value <= stops[0].value) return stops[0].color;
      if (value >= stops[stops.length - 1].value) return stops[stops.length - 1].color;
      for (let i = 1; i < stops.length; i += 1) {
        const prev = stops[i - 1];
        const next = stops[i];
        if (value <= next.value) {
          const ratio = (value - prev.value) / (next.value - prev.value);
          return mixColor(prev.color, next.color, ratio);
        }
      }
      return stops[stops.length - 1].color;
    }

    function smoothStep(edge0, edge1, value) {
      const ratio = clamp((value - edge0) / (edge1 - edge0), 0, 1);
      return ratio * ratio * (3 - 2 * ratio);
    }

    function humidityFillColor(value) {
      return mixColor("#2aa36f", "#4d9dff", clamp(value / 100, 0, 1));
    }

    function humidityOpacityMultiplier(value) {
      const humidity = clamp(value, 0, 100);
      return 0.2
        + 0.2 * smoothStep(25, 35, humidity)
        + 0.4 * smoothStep(50, 60, humidity)
        + 0.2 * smoothStep(75, 100, humidity);
    }

    function computeRanges(rows) {
      const nextRanges = {};
      metricKeys.forEach((key) => {
        const values = rows.map((d) => d[key]).filter(Number.isFinite);
        if (!values.length) {
          nextRanges[key] = fallbackRanges[key];
          return;
        }
        let min = Math.min(...values);
        let max = Math.max(...values);
        if (min === max) {
          nextRanges[key] = fallbackRanges[key];
          return;
        }
        const pad = (max - min) * 0.04;
        nextRanges[key] = { min: min - pad, max: max + pad, rawMin: min, rawMax: max };
      });

      const windValues = rows.flatMap((d) => {
        const wind = Number.isFinite(d.wind) ? d.wind : null;
        const gust = Number.isFinite(d.gust) ? d.gust : wind;
        if (wind === null) return [];
        return [wind, Math.max(gust ?? wind, wind)];
      });
      if (windValues.length) {
        const rawMin = Math.min(...windValues);
        const rawMax = Math.max(...windValues);
        const pad = rawMin === rawMax ? Math.max(2, rawMax * 0.2) : (rawMax - rawMin) * 0.04;
        const sharedWindRange = {
          min: Math.max(0, rawMin - pad),
          max: rawMax + pad,
          rawMin,
          rawMax
        };
        nextRanges.wind = sharedWindRange;
        nextRanges.gust = sharedWindRange;
      }
      return nextRanges;
    }

    function rangeFor(key) {
      const range = ranges[key] || fallbackRanges[key];
      return Number.isFinite(range.min) && Number.isFinite(range.max) && range.max > range.min ? range : fallbackRanges[key];
    }

    function normalize(key, value) {
      const range = rangeFor(key);
      const normalized = clamp((value - range.min) / (range.max - range.min), 0, 1);
      return invertedMetrics.has(key) ? 1 - normalized : normalized;
    }

    function isWeekView() {

    function x(hour) {

    function y(key, value) {

    function metricY(key, value) {

    function coords(dataPoint, key) {
      return {
        x: x(dataPoint.h),
        y: y(key, dataPoint[key])

    function point(dataPoint, key) {
      const p = coords(dataPoint, key);
      return `${p.x.toFixed(2)},${p.y.toFixed(2)}`;
    }

    function curveControls(points, key, index) {
      const p0 = coords(points[Math.max(0, index - 2)], key);
      const p1 = coords(points[index - 1], key);
      const p2 = coords(points[index], key);
      const p3 = coords(points[Math.min(points.length - 1, index + 1)], key);
      const c1 = {
        x: p1.x + (p2.x - p0.x) / 6,
        y: p1.y + (p2.y - p0.y) / 6
      };
      const c2 = {
        x: p2.x - (p3.x - p1.x) / 6,
        y: p2.y - (p3.y - p1.y) / 6
      };
      return { c1, c2, p1, p2 };
    }

    function curveSegment(points, key, index) {
      const { c1, c2, p2 } = curveControls(points, key, index);
      return `C ${c1.x.toFixed(2)},${c1.y.toFixed(2)} ${c2.x.toFixed(2)},${c2.y.toFixed(2)} ${p2.x.toFixed(2)},${p2.y.toFixed(2)}`;
    }

    function reverseCurveSegment(points, key, index) {
      const { c1, c2, p1 } = curveControls(points, key, index);
      return `C ${c2.x.toFixed(2)},${c2.y.toFixed(2)} ${c1.x.toFixed(2)},${c1.y.toFixed(2)} ${p1.x.toFixed(2)},${p1.y.toFixed(2)}`;
    }

    function linearPathFrom(points, key) {
      return points.map((d, index) => `${index === 0 ? "M" : "L"} ${point(d, key)}`).join(" ");
    }

    function linearPathFromY(points, key, yAccessor) {
      return points.map((d, index) => {
        const xx = x(d.h).toFixed(2);
        const yy = yAccessor(key, d[key]).toFixed(2);
        return `${index === 0 ? "M" : "L"} ${xx},${yy}`;
      }).join(" ");
    }

    function pathFrom(points, key) {
      if (points.length < 2) return points.length ? `M ${point(points[0], key)}` : "";
      const start = `M ${point(points[0], key)}`;
      const curves = [];
      for (let i = 1; i < points.length; i += 1) {
        curves.push(curveSegment(points, key, i));
      }
      return `${start} ${curves.join(" ")}`;
    }

    function setTempGradient(id, points, key) {
      const defs = svg.querySelector("defs");
      const existing = document.getElementById(id);

      const gradient = makeEl("linearGradient", {

      });
      defs.appendChild(gradient);

    function drawTempGradientLine(group, points, key, width, opacity = 1) {
      const gradientId = `tempGradient-${key}`;
      setTempGradient(gradientId, points, key);
      group.appendChild(makeEl("path", {
        d: pathFrom(points, key),
        class: "line",
        stroke: `url(#${gradientId})`,
        "stroke-width": width,
        opacity
      }));
    }

    function areaToBottom(points, key) {
      const first = points[0];
      const last = points[points.length - 1];
      const line = pathFrom(points, key);
      return `${line} L ${x(last.h).toFixed(2)},${layout.top + chartHeight} L ${x(first.h).toFixed(2)},${layout.top + chartHeight} Z`;
    }

    function areaBetween(points, highKey, lowKey) {
      const high = pathFrom(points, highKey);
      const low = pathFrom(points.slice().reverse(), lowKey).replace(/^M/, "L");
      return `${high} ${low} Z`;
    }

    function segmentAreaBetween(points, index, highKey, lowKey) {
      const prev = points[index - 1];
      const next = points[index];
      return `M ${point(prev, highKey)} ${curveSegment(points, highKey, index)} L ${point(next, lowKey)} ${reverseCurveSegment(points, lowKey, index)} Z`;
    }

    function coordsByY(points, yKey, index) {
      return {
        x: x(points[index].h),
        y: points[index][yKey]
      };
    }

    function pointByY(dataPoint, yKey) {
      return `${x(dataPoint.h).toFixed(2)},${dataPoint[yKey].toFixed(2)}`;
    }

    function curveControlsByY(points, yKey, index) {
      const p0 = coordsByY(points, yKey, Math.max(0, index - 2));
      const p1 = coordsByY(points, yKey, index - 1);
      const p2 = coordsByY(points, yKey, index);
      const p3 = coordsByY(points, yKey, Math.min(points.length - 1, index + 1));
      const minY = Math.min(p1.y, p2.y);
      const maxY = Math.max(p1.y, p2.y);
      const c1 = {
        x: p1.x + (p2.x - p0.x) / 6,
        y: clamp(p1.y + (p2.y - p0.y) / 6, minY, maxY)
      };
      const c2 = {
        x: p2.x - (p3.x - p1.x) / 6,
        y: clamp(p2.y - (p3.y - p1.y) / 6, minY, maxY)
      };
      return { c1, c2, p2 };
    }

    function curveSegmentByY(points, yKey, index) {
      const { c1, c2, p2 } = curveControlsByY(points, yKey, index);
      return `C ${c1.x.toFixed(2)},${c1.y.toFixed(2)} ${c2.x.toFixed(2)},${c2.y.toFixed(2)} ${p2.x.toFixed(2)},${p2.y.toFixed(2)}`;
    }

    function pathFromY(points, yKey) {
      if (points.length < 2) return points.length ? `M ${pointByY(points[0], yKey)}` : "";
      const curves = [];
      for (let i = 1; i < points.length; i += 1) {
        curves.push(curveSegmentByY(points, yKey, i));
      }
      return `M ${pointByY(points[0], yKey)} ${curves.join(" ")}`;
    }

    function areaToTop(points, key) {
      const first = points[0];
      const last = points[points.length - 1];
      const line = pathFrom(points, key);
      return `${line} L ${x(last.h).toFixed(2)},${layout.top} L ${x(first.h).toFixed(2)},${layout.top} Z`;
    }

    function makeEl(name, attrs = {}) {
      const el = document.createElementNS("http://www.w3.org/2000/svg", name);
      Object.entries(attrs).forEach(([key, value]) => el.setAttribute(key, value));
      return el;
    }

    function isCompactLayout() {
      return layout.width < 520;
    }

    function dailyStats() {
      const day = forecast.filter((d) => d.h < 24);
      const highFeels = day.reduce((best, d) => d.feels > best.feels ? d : best, day[0]);
      const lowFeels = day.reduce((best, d) => d.feels < best.feels ? d : best, day[0]);
      const maxRain = day.reduce((best, d) => d.rain > best.rain ? d : best, day[0]);
      const maxWind = day.reduce((best, d) => {
        const bestValue = Math.max(best.wind, best.gust ?? best.wind);
        const value = Math.max(d.wind, d.gust ?? d.wind);
        return value > bestValue ? d : best;
      }, day[0]);
      const maxWindValue = Math.max(maxWind.wind, maxWind.gust ?? maxWind.wind);
      const avgWind = day.reduce((sum, d) => sum + d.wind, 0) / day.length;
      const periodRange = rangeFor("feels");
      const periodHighFeels = periodRange.rawMax ?? periodRange.max;
      const periodLowFeels = periodRange.rawMin ?? periodRange.min;
      return { day, highFeels, lowFeels, maxRain, maxWind, maxWindValue, avgWind, periodHighFeels, periodLowFeels };
    }

    function appendText(parent, text, attrs = {}) {
      const node = makeEl("text", attrs);
      node.textContent = text;
      parent.appendChild(node);
      return node;
    }

    function appendTspan(parent, text, attrs = {}) {
      const node = makeEl("tspan", attrs);
      node.textContent = text;
      parent.appendChild(node);
      return node;
    }

    function rightAxisY(rawY, compactBottomPad = 18) {
      return clamp(rawY, layout.top + 12, layout.top + chartHeight - (isCompactLayout() ? compactBottomPad : 4));
    }

    function drawRightValueUnitLabel(parent, valueText, unitText, xPos, yPos, className) {
      const label = makeEl("text", {
        x: xPos,
        y: yPos,
        class: className,
        "text-anchor": "start"
      });
      if (isCompactLayout()) {
        appendTspan(label, valueText, { x: xPos, dy: 0 });
        appendTspan(label, unitText, { x: xPos, dy: 11, class: "right-axis-unit" });
      } else {
        label.textContent = `${valueText} ${unitText}`;
      }
      parent.appendChild(label);
      return label;
    }

    function windUnitHtml() {
      return "km/h";
    }

    function drawCompactWindUnit(parent, xPos, yPos, valueText = "", placement = "side") {
      const unitOffset = placement === "below"
        ? Math.max(8, valueText.length * 3.8 + (valueText.startsWith("~") ? 1 : 0))
        : Math.max(30, valueText.length * 8 + 14);
      const unitY = placement === "below" ? yPos + 19 : yPos - 3.2;
      const unit = makeEl("g", {
        class: "compact-wind-unit",
        "data-placement": placement,
        transform: `translate(${(xPos + unitOffset).toFixed(2)} ${unitY.toFixed(2)})`,
        "aria-hidden": "true"
      });
      appendText(unit, "km", { x: 0, y: -6.8, "text-anchor": "middle" });
      unit.appendChild(makeEl("line", { x1: -5.8, y1: 0.9, x2: 5.8, y2: 0.9 }));
      appendText(unit, "h", { x: 0, y: 9.3, "text-anchor": "middle" });
      parent.appendChild(unit);
    }

    function drawWindAxisLabel(parent, valueText, xPos, yPos) {
      appendText(parent, valueText, {
        x: xPos,
        y: yPos,
        class: "axis-label wind-axis",
        "text-anchor": "start"
      });
      drawCompactWindUnit(parent, xPos, yPos, valueText, isCompactLayout() ? "below" : "side");
    }

    function drawGrid() {
      const group = makeEl("g", { "aria-hidden": "true" });
      [0, 0.25, 0.5, 0.75, 1].forEach((n) => {
        const yy = yNorm(n);
        group.appendChild(makeEl("line", {
          x1: layout.left,
          y1: yy,
          x2: layout.width - layout.right,
          y2: yy,
          class: n === 0 || n === 1 ? "grid-line strong" : "grid-line"
        }));
      });
      if (isWeekView()) {
        const startDate = selectedOpenMeteoDate(0);
        for (let day = 0; day <= 7; day += 1) {
          const hour = day * 24;
          const xx = x(hour);
          group.appendChild(makeEl("line", {
            x1: xx,
            y1: layout.top,
            x2: xx,
            y2: layout.top + chartHeight,
            class: "grid-line"
          }));
          if (day >= 7) continue;
          const label = makeEl("text", {
            x: x(hour + 12),
            y: layout.top + chartHeight + 30,
            class: "axis-label",
            "text-anchor": "middle"
          });
          label.textContent = formatWeekdayShort(addDays(startDate, day));
          group.appendChild(label);
        }
        plot.appendChild(group);

      }

      [0, 6, 12, 18, 24].forEach((hour) => {
        const xx = x(hour);
        group.appendChild(makeEl("line", {
          x1: xx,
          y1: layout.top,
          x2: xx,
          y2: layout.top + chartHeight,
          class: "grid-line"
        }));
        const label = makeEl("text", {
          x: xx,
          y: layout.top + chartHeight + 30,
          class: "axis-label",
          "text-anchor": hour === 0 ? "start" : hour === 24 ? "end" : "middle"
        });
        label.textContent = String(hour).padStart(2, "0");
        group.appendChild(label);
      });
      plot.appendChild(group);
    }

    function seriesGroup(name) {
      const group = makeEl("g", { class: "series", "data-metric": name });
      (activeSeriesLayer || seriesRootLayer || plot).appendChild(group);
      return group;
    }

    function conditionType(code) {
      if (code === 0) return "clear";
      if (code === 1 || code === 2) return "partly";
      if (code === 3) return "cloud";
      if (code === 45 || code === 48) return "fog";
      if ((code >= 51 && code <= 67) || (code >= 80 && code <= 82)) return "rain";
      if ((code >= 71 && code <= 77) || code === 85 || code === 86) return "snow";
      if (code >= 95) return "storm";
      return "cloud";
    }

    function conditionDescription(code) {
      const labels = {
        0: "clear sky",
        1: "mainly clear",
        2: "partly cloudy",
        3: "overcast",
        45: "fog",
        48: "depositing rime fog",
        51: "light drizzle",
        53: "drizzle",
        55: "dense drizzle",
        61: "light rain",
        63: "rain",
        65: "heavy rain",
        71: "light snow",
        73: "snow",
        75: "heavy snow",
        80: "rain showers",
        81: "rain showers",
        82: "violent showers",
        95: "thunderstorm",
        96: "thunderstorm with hail",
        99: "thunderstorm with hail"
      };
      return labels[code] || "conditions";
    }

    function clearConditionGlyphDefs() {
      svg.querySelectorAll('[data-condition-def="true"]').forEach((el) => el.remove());
      conditionDefId.counter = 0;
    }

    function conditionDefId(prefix) {
      conditionDefId.counter = (conditionDefId.counter || 0) + 1;
      return `${prefix}-${conditionDefId.counter}`;
    }

    function selectedDateForGlyphs() {
      return selectedOpenMeteoDate() || "2026-07-05";
    }

    function sunEventsForDate(date) {
      return sunEventsByDate.get(date) || (!openMeteoRows.length ? sampleSunEvents : null);
    }

    function selectedSunEvents() {
      return sunEventsForDate(selectedDateForGlyphs());
    }

    function activeLocation() {
      if (openMeteoLocation) return openMeteoLocation;
      const lat = Number(latitudeInput.value);
      const lon = Number(longitudeInput.value);
      return {
        lat: Number.isFinite(lat) ? lat : 50.03,
        lon: Number.isFinite(lon) ? lon : 14.48
      };
    }

    function localDateAtHour(dateString, hour) {
      const [year, month, day] = dateString.split("-").map(Number);
      const date = new Date(year, month - 1, day, 0, 0, 0, 0);
      date.setMinutes(Math.round(hour * 60));
      return date;
    }

    function dayOfYear(date) {
      const start = Date.UTC(date.getFullYear(), 0, 0);
      const current = Date.UTC(date.getFullYear(), date.getMonth(), date.getDate());
      return (current - start) / 86400000;
    }

    function solarAzimuth(dateString, hour) {
      const { lat, lon } = activeLocation();
      if (!Number.isFinite(lat) || !Number.isFinite(lon) || !dateString || !Number.isFinite(hour)) return null;

      const date = localDateAtHour(dateString, hour);
      const localHour = date.getHours() + date.getMinutes() / 60 + date.getSeconds() / 3600;
      const gamma = (2 * Math.PI / 365) * (dayOfYear(date) - 1 + (localHour - 12) / 24);
      const equationOfTime = 229.18 * (
        0.000075 +
        0.001868 * Math.cos(gamma) -
        0.032077 * Math.sin(gamma) -
        0.014615 * Math.cos(2 * gamma) -
        0.040849 * Math.sin(2 * gamma)
      );
      const declination = (
        0.006918 -
        0.399912 * Math.cos(gamma) +
        0.070257 * Math.sin(gamma) -
        0.006758 * Math.cos(2 * gamma) +
        0.000907 * Math.sin(2 * gamma) -
        0.002697 * Math.cos(3 * gamma) +
        0.00148 * Math.sin(3 * gamma)
      );
      const timezoneHours = -date.getTimezoneOffset() / 60;
      const solarMinutes = (localHour * 60 + equationOfTime + 4 * lon - 60 * timezoneHours + 1440) % 1440;
      let hourAngle = solarMinutes / 4 - 180;
      if (hourAngle < -180) hourAngle += 360;

      const latRad = lat * Math.PI / 180;
      const hourAngleRad = hourAngle * Math.PI / 180;
      const azimuth = Math.atan2(
        Math.sin(hourAngleRad),
        Math.cos(hourAngleRad) * Math.sin(latRad) - Math.tan(declination) * Math.cos(latRad)
      ) * 180 / Math.PI + 180;
      return (azimuth + 360) % 360;
    }

    function formatAzimuth(dateString, hour) {
      const azimuth = solarAzimuth(dateString, hour);
      return Number.isFinite(azimuth) ? `${Math.round(azimuth)}°` : "";
    }

    function solarNoonHour(events) {
      if (Number.isFinite(events?.solarNoonHour)) return events.solarNoonHour;
      if (Number.isFinite(events?.sunriseHour) && Number.isFinite(events?.sunsetHour)) {
        return (events.sunriseHour + events.sunsetHour) / 2;
      }
      return 12;
    }

    function rowIsDay(row) {
      if (typeof row.isDay === "boolean") return row.isDay;
      const hour = hourWithinDay(row.h);
      const events = sunEventsForDate(row.date || selectedDateForGlyphs());
      if (events && Number.isFinite(events.sunriseHour) && Number.isFinite(events.sunsetHour)) {
        return hour >= events.sunriseHour && hour < events.sunsetHour;
      }
      return hour >= 6 && hour < 20;
    }

    function moonPhaseForTime(time) {
      const date = new Date(time || `${selectedDateForGlyphs()}T00:00`);
      const timestamp = Number.isFinite(date.getTime()) ? date.getTime() : Date.UTC(2026, 6, 5);
      const knownNewMoon = Date.UTC(2000, 0, 6, 18, 14);
      const synodicMonth = 29.530588853;
      const days = (timestamp - knownNewMoon) / 86400000;
      return ((days / synodicMonth) % 1 + 1) % 1;
    }

    function rowMoonPhase(row) {
      const hour = Math.floor(row.h);
      const minute = Math.round((row.h - hour) * 60);
      const time = row.time || `${row.date || selectedDateForGlyphs()}T${String(hour).padStart(2, "0")}:${String(minute).padStart(2, "0")}`;
      return moonPhaseForTime(time);
    }

    function drawMoonDisc(group, phase) {
      const defs = svg.querySelector("defs");
      const clipId = conditionDefId("moonClip");
      const clipPath = makeEl("clipPath", {
        id: clipId,
        "data-condition-def": "true",
        clipPathUnits: "userSpaceOnUse"
      });
      clipPath.appendChild(makeEl("circle", { cx: -4, cy: -5, r: 8 }));
      defs.appendChild(clipPath);

      const moon = makeEl("g", { "clip-path": `url(#${clipId})` });
      moon.appendChild(makeEl("circle", { cx: -4, cy: -5, r: 8, fill: "#dbe7f4" }));
      const waxing = phase < 0.5;
      const distance = phase < 0.5 ? phase / 0.5 : (1 - phase) / 0.5;
      const offset = (waxing ? -1 : 1) * 17 * distance;
      moon.appendChild(makeEl("circle", {
        cx: -4 + offset,
        cy: -5,
        r: 8.35,
        fill: "#263042"
      }));
      moon.appendChild(makeEl("circle", {
        cx: -4,
        cy: -5,
        r: 8,
        fill: "none",
        stroke: "rgba(255,255,255,0.35)",
        "stroke-width": 0.8
      }));
      group.appendChild(moon);
    }

    function drawSunDisc(group) {
      group.appendChild(makeEl("circle", { cx: -4, cy: -5, r: 8, fill: "#ffd15c" }));
    }

    function drawWeatherGlyph(parent, type, cx, cy, scale = 1, options = {}) {
      const attrs = {
        transform: `translate(${cx.toFixed(2)} ${cy.toFixed(2)}) scale(${scale})`,
        opacity: 0.9,
        "data-weather-glyph": type,
        "data-night": String(Boolean(options.isNight))
      };
      if (options.sunEvent) attrs["data-sun-event"] = options.sunEvent;
      const group = makeEl("g", attrs);
      const isNight = options.isNight;

      function cloud(target, opacity = 1) {
        target.appendChild(makeEl("path", {
          d: "M-13 5 H10 C14 5 17 2 17-2 C17-6 13-9 9-8 C6-14-3-14-6-8 C-11-8-15-5-15 0 C-18 1-18 5-13 5Z",
          fill: "#eef1f7",
          opacity
        }));
      }

      function compactCloudGroup(opacity = 0.82, transform = "translate(-4 2.4) scale(0.7)") {
        const cloudGroup = makeEl("g", { transform });
        cloud(cloudGroup, opacity);
        group.appendChild(cloudGroup);
        return cloudGroup;
      }

      if (type === "clear" || type === "partly") {
        if (isNight) {
          drawMoonDisc(group, options.moonPhase ?? 0);
        } else {
          drawSunDisc(group);
        }
      }
      if (type === "partly" || type === "cloud" || type === "rain" || type === "snow" || type === "storm") {
        if (type === "partly") {
          compactCloudGroup(0.95, "translate(3 2.4) scale(0.7)");
        } else if (type === "cloud") {
          compactCloudGroup(0.95);
        } else {
          const weatherGroup = compactCloudGroup(0.82);
          if (type === "rain") {
            [-7, 0, 7].forEach((offset) => {
              weatherGroup.appendChild(makeEl("line", {
                x1: offset,
                y1: 10,
                x2: offset - 3,
                y2: 17,
                stroke: colors.rain,
                "stroke-width": 2.4,
                "stroke-linecap": "round"
              }));
            });
          }
          if (type === "snow") {
            [-7, 0, 7].forEach((offset) => {
              weatherGroup.appendChild(makeEl("circle", { cx: offset, cy: 13, r: 2, fill: "#eef1f7" }));
            });
          }
          if (type === "storm") {
            weatherGroup.appendChild(makeEl("path", {
              d: "M-1 7 L-6 18 L1 15 L-2 24 L8 10 L1 13 Z",
              fill: "#ffd15c"
            }));
          }
        }
      }
      if (type === "fog") {
        [-7, 0, 7].forEach((offset) => {
          group.appendChild(makeEl("line", {
            x1: -14,
            y1: offset,
            x2: 14,
            y2: offset,
            stroke: "#eef1f7",
            "stroke-width": 2.4,
            "stroke-linecap": "round",
            opacity: 0.75
          }));
        });
      }
      parent.appendChild(group);
    }

    function conditionRowsForStep(step) {
      const domain = chartDomainHours();
      const rows = forecast.filter((d) => Number.isInteger(d.h) && d.h >= 0 && d.h < domain);
      const regular = rows.filter((d) => d.h % step === 0);
      if (isWeekView()) return regular;
      const finalHourValue = domain - 1;
      const finalHour = rows.find((d) => d.h === finalHourValue);
      if (!finalHour || regular.some((d) => d.h === finalHourValue)) return regular;

      const lastIndex = regular.length - 1;
      if (lastIndex >= 0 && regular[lastIndex].h >= finalHourValue - 1) {
        return [...regular.slice(0, lastIndex), finalHour];
      }
      return [...regular, finalHour];
    }

    function conditionRowNearHour(hour) {
      return forecast
        .filter((d) => d.h >= 0 && d.h < chartDomainHours())
        .reduce((best, row) => Math.abs(row.h - hour) < Math.abs(best.h - hour) ? row : best, forecast[0]);
    }

    function conditionSymbolHour(row, step) {
      const domain = chartDomainHours();
      const endHour = row.h >= domain - 1 ? domain : Math.min(domain, row.h + step);
      return row.h + (endHour - row.h) / 2;
    }

    function drawWeekDailySummaries(group) {
      if (!isWeekView()) return;
      const labelY = layout.top - 13;
      for (let day = 0; day < 7; day += 1) {
        const rows = forecast.filter((row) => row.h >= day * 24 && row.h < (day + 1) * 24);
        if (!rows.length) continue;
        const temps = rows.map((row) => row.actual).filter(Number.isFinite);
        if (!temps.length) continue;
        const low = Math.min(...temps);
        const high = Math.max(...temps);
        const xPos = x(day * 24 + 12);
        const label = makeEl("text", {
          x: xPos,
          y: labelY,
          class: "axis-label temp-axis temp-axis-daily week-day-summary",
          "text-anchor": "middle"
        });
        appendTspan(label, String(round(low)), { x: xPos, fill: tempColor(low) });
        appendTspan(label, "-", { fill: "var(--muted)" });
        appendTspan(label, `${round(high)}°`, { fill: tempColor(high) });
        group.appendChild(label);
      }
    }

    function drawConditions() {
      const group = makeEl("g", { class: "series", "data-metric": "conditions", "aria-hidden": "true" });
      const compact = isCompactLayout();
      const step = conditionStepHours();
      const scale = compact ? 0.58 : 0.72;
      const glyphY = layout.top - 34;
      const sunEventY = glyphY + 34 * scale * 0.3;
      const symbolSpacing = x(step) - x(0);
      const events = selectedSunEvents();
      const sunMarkers = isWeekView() ? [] : [
        events && Number.isFinite(events.sunriseHour) ? { type: "sunrise", hour: events.sunriseHour } : null,
        events && Number.isFinite(events.sunsetHour) ? { type: "sunset", hour: events.sunsetHour } : null
      ].filter(Boolean);
      conditionRowsForStep(step).forEach((d) => {
        const symbolHour = conditionSymbolHour(d, step);
        const tooCloseToSunEvent = sunMarkers.some((marker) => Math.abs(x(symbolHour) - x(marker.hour)) < symbolSpacing / 2);
        if (tooCloseToSunEvent) return;
        drawWeatherGlyph(group, conditionType(d.weatherCode), x(symbolHour), glyphY, scale, {
          isNight: !rowIsDay(d),
          moonPhase: rowMoonPhase(d)
        });
      });
      sunMarkers.forEach((marker) => {
        const eventRow = conditionRowNearHour(marker.hour);
        drawWeatherGlyph(group, conditionType(eventRow.weatherCode), x(marker.hour), sunEventY, scale, {
          isNight: false,
          moonPhase: moonPhaseForTime(marker.type === "sunrise" ? events.sunrise : events.sunset),
          sunEvent: marker.type
        });
      });
      drawWeekDailySummaries(group);
      plot.appendChild(group);
    }

    function drawHumidity() {
      const group = seriesGroup("humidity");
      setHumidityGradient();
      group.appendChild(makeEl("path", {
        d: areaToTop(forecast, "humidity"),
        fill: "url(#humidityFill)",
        stroke: "none"
      }));
    }

    function setHumidityGradient() {
      const defs = svg.querySelector("defs");
      const existing = document.getElementById("humidityFill");
      if (existing) existing.remove();

      const gradient = makeEl("linearGradient", {
        id: "humidityFill",
        gradientUnits: "userSpaceOnUse",
        x1: 0,
        y1: layout.top,
        x2: 0,
        y2: layout.top + chartHeight
      });
      const range = rangeFor("humidity");
      const visibleMin = clamp(range.min, 0, 100);
      const visibleMax = clamp(range.max, 0, 100);
      const span = Math.max(1, visibleMax - visibleMin);
      const baseOpacity = 0.34;

      for (let i = 0; i <= 80; i += 1) {
        const value = visibleMin + (span * i) / 80;
        const opacity = round(baseOpacity * humidityOpacityMultiplier(value), 3);
        gradient.appendChild(makeEl("stop", {
          offset: `${round((i / 80) * 100, 2)}%`,
          "stop-color": humidityFillColor(value),
          "stop-opacity": opacity
        }));
      }

      defs.appendChild(gradient);
    }

    function baseWindOpacityAtY(yValue) {
      const ratio = clamp((yValue - layout.top) / chartHeight, 0, 1);
      return 0.34 + (0.08 - 0.34) * ratio;
    }

    function windDistanceMultiplier(distanceFromCenter) {
      return 0.3 + 1.2 * (1 - smoothStep(0, 1, clamp(distanceFromCenter, 0, 1)));
    }

    function windContourAmount(distanceFromCenterPx, half, hour) {
      if (!windContourEnabled) return 0;
      const normalizedDistance = clamp(distanceFromCenterPx / Math.max(1, half), 0, 1);
      const phase = ((distanceFromCenterPx + hour * windContourDrift) / windContourSpacing) % 1;
      const ridge = 1 - Math.abs(phase * 2 - 1);
      const edgeEase = 1 - smoothStep(0.88, 1, normalizedDistance);
      return smoothStep(0.58, 1, ridge) * edgeEase;
    }

    function clearWindGradients() {
      svg.querySelectorAll('linearGradient[data-wind-fill="true"]').forEach((gradient) => gradient.remove());
    }

    function windBandPoints() {
      const minThickness = layout.width < 520 ? 8 : 12;
      return forecast.map((d) => {
        const windSpeed = Number.isFinite(d.wind) ? d.wind : 0;
        const gustSpeed = Math.max(Number.isFinite(d.gust) ? d.gust : windSpeed, windSpeed);
        let upper = Math.min(y("gust", gustSpeed), y("wind", windSpeed));
        let lower = Math.max(y("gust", gustSpeed), y("wind", windSpeed));
        let middle = (upper + lower) / 2;
        let half = Math.max((lower - upper) / 2, minThickness / 2);
        upper = clamp(middle - half, layout.top, layout.top + chartHeight);
        lower = clamp(middle + half, layout.top, layout.top + chartHeight);
        if (lower - upper < minThickness) {
          if (upper <= layout.top) lower = Math.min(layout.top + chartHeight, upper + minThickness);
          if (lower >= layout.top + chartHeight) upper = Math.max(layout.top, lower - minThickness);
        }
        middle = (upper + lower) / 2;
        half = (lower - upper) / 2;
        return { h: d.h, middle, half };
      });
    }

    function interpolateBandValue(points, key, hour) {
      if (hour <= points[0].h) return points[0][key];
      if (hour >= points[points.length - 1].h) return points[points.length - 1][key];
      const index = Math.min(points.length - 1, Math.max(1, Math.ceil(hour)));
      const p0 = points[Math.max(0, index - 2)][key];
      const p1 = points[index - 1][key];
      const p2 = points[index][key];
      const p3 = points[Math.min(points.length - 1, index + 1)][key];
      const span = points[index].h - points[index - 1].h || 1;
      const t = clamp((hour - points[index - 1].h) / span, 0, 1);
      const t2 = t * t;
      const t3 = t2 * t;
      const value = 0.5 * (
        (2 * p1)
        + (-p0 + p2) * t
        + (2 * p0 - 5 * p1 + 4 * p2 - p3) * t2
        + (-p0 + 3 * p1 - 3 * p2 + p3) * t3
      );
      return clamp(value, Math.min(p1, p2), Math.max(p1, p2));
    }

    function renderWindField(points) {
      const width = Math.max(1, Math.round(chartWidth));
      const height = Math.max(1, Math.round(chartHeight));
      const canvas = document.createElement("canvas");
      canvas.width = width;
      canvas.height = height;
      const context = canvas.getContext("2d");
      const image = context.createImageData(width, height);
      const windColor = hexToRgb(colors.wind);
      const contourColor = hexToRgb(windContourShadow);

      for (let px = 0; px < width; px += 1) {
        const hour = (px / Math.max(1, width - 1)) * chartDomainHours();
        const middle = interpolateBandValue(points, "middle", hour);
        const half = Math.max(1, interpolateBandValue(points, "half", hour));
        const upper = middle - half;
        const lower = middle + half;
        const startY = Math.max(0, Math.floor(upper - layout.top - 2));
        const endY = Math.min(height - 1, Math.ceil(lower - layout.top + 2));

        for (let py = startY; py <= endY; py += 1) {
          const yValue = layout.top + py + 0.5;
          const distanceToEdge = Math.min(yValue - upper, lower - yValue);
          if (distanceToEdge < 0) continue;
          const edgeFade = clamp(distanceToEdge / 1.5, 0, 1);
          const distanceFromCenter = clamp(Math.abs(yValue - middle) / half, 0, 1);
          const opacity = baseWindOpacityAtY(yValue) * windDistanceMultiplier(distanceFromCenter) * edgeFade;
          const contour = windContourAmount(Math.abs(yValue - middle), half, hour) * windContourStrength;
          const offset = (py * width + px) * 4;
          image.data[offset] = windColor.r + (contourColor.r - windColor.r) * contour;
          image.data[offset + 1] = windColor.g + (contourColor.g - windColor.g) * contour;
          image.data[offset + 2] = windColor.b + (contourColor.b - windColor.b) * contour;
          image.data[offset + 3] = clamp(Math.round(opacity * 255), 0, 255);
        }
      }

      context.putImageData(image, 0, 0);
      return canvas.toDataURL("image/png");
    }

    function drawWind() {
      const group = seriesGroup("wind");
      clearWindGradients();
      const points = windBandPoints();
      group.appendChild(makeEl("image", {
        x: layout.left,
        y: layout.top,
        width: chartWidth,
        height: chartHeight,
        href: renderWindField(points),
        preserveAspectRatio: "none"
      }));
    }

    function drawTemperature() {
      const group = seriesGroup("temperature");
      drawTempGradientLine(group, forecast, "actual", isWeekView() ? 1.5 : 3, 0.3);
      drawTempGradientLine(group, forecast, "feels", isWeekView() ? 2.4 : 4.8, isWeekView() ? 0.5 : 1);

      const high = forecast.reduce((best, d) => d.feels > best.feels ? d : best, forecast[0]);
      const low = forecast.reduce((best, d) => d.feels < best.feels ? d : best, forecast[0]);
      [
        { data: high },
        { data: low }
      ].forEach((item) => {
        const cx = x(item.data.h);
        const cy = y("feels", item.data.feels);
        group.appendChild(makeEl("circle", {
          cx,
          cy,
          r: 3.4,
          fill: tempColor(item.data.feels),
          stroke: "#151820",
          "stroke-width": 1.2,
          opacity: 0.72
        }));
      });
    }

    function consecutiveRuns(points) {
      const runs = [];
      let run = [];
      points.forEach((point, index) => {
        if (!run.length || point.h - points[index - 1].h <= 1.01) {
          run.push(point);
        } else {
          runs.push(run);
          run = [point];
        }
      });
      if (run.length) runs.push(run);
      return runs;
    }

    function probabilityOpacity(value) {
      return clamp(value / 100, 0, 1);
    }

    function rainProbabilityOpacity(value) {
      return focusedMetric() === "rain" ? 1 : probabilityOpacity(value);
    }

    function valueOpacity(key, value, maxOpacity = 1) {
      if (!Number.isFinite(value) || value <= 0) return 0;
      const range = rangeFor(key);
      const max = Math.max(1, range.rawMax ?? range.max ?? value);
      return maxOpacity * clamp(value / max, 0, 1);
    }

    function rainAmountColumns() {
      const domain = chartDomainHours();
      if (!isWeekView()) {
        return forecast
          .filter((d) => d.rain > 0 && d.h >= 0 && d.h < domain)
          .map((d) => ({
            start: d.h,
            end: Math.min(domain, d.h + 1),
            center: d.h + 0.5,
            rain: d.rain
          }));
      }

      const step = rainAmountStepHours();
      const columns = [];
      for (let start = 0; start < domain; start += step) {
        const end = Math.min(domain, start + step);
        const rain = forecast
          .filter((d) => d.h >= start && d.h < end && Number.isFinite(d.rain) && d.rain > 0)
          .reduce((sum, d) => sum + d.rain, 0);
        if (rain > 0) {
          columns.push({
            start,
            end,
            center: start + (end - start) / 2,
            rain: round(rain, 1)
          });
        }
      }
      return columns;
    }

    function rainAmountColumnWidth(column) {
      if (!isWeekView()) return layout.width < 520 ? 8 : 16;
      const slotWidth = x(column.end) - x(column.start);
      const minWidth = layout.width < 520 ? 4 : 5;
      const maxWidth = layout.width < 520 ? 9 : 12;
      return clamp(slotWidth * 0.42, minWidth, maxWidth);
    }

    function rainAmountColumnBottom(column) {
      return y("rain", column.rain);
    }

    function drawRain() {
      const group = seriesGroup("rain");
      consecutiveRuns(forecast.filter((d) => d.pop > 0)).forEach((run) => {
        if (run.length > 1) {
          for (let i = 1; i < run.length; i += 1) {
            const prev = run[i - 1];
            const next = run[i];
            group.appendChild(makeEl("path", {
              d: `M ${point(prev, "pop")} ${curveSegment(run, "pop", i)}`,
              class: "line",
              stroke: colors.rain,
              "stroke-width": 3,
              "stroke-dasharray": "6 9",
              "stroke-opacity": rainProbabilityOpacity((prev.pop + next.pop) / 2)
            }));
          }
        } else {
          group.appendChild(makeEl("circle", {
            cx: x(run[0].h),
            cy: y("pop", run[0].pop),
            r: 4,
            fill: colors.rain,
            opacity: rainProbabilityOpacity(run[0].pop)
          }));
        }
      });

      const columns = rainAmountColumns();
      columns.forEach((column) => {
        const barWidth = rainAmountColumnWidth(column);
        const bottom = rainAmountColumnBottom(column);
        const barCenter = x(column.center);
        group.appendChild(makeEl("rect", {
          x: barCenter - barWidth / 2,
          y: layout.top,
          width: barWidth,
          height: bottom - layout.top,
          rx: 4,
          fill: colors.rain,
          opacity: 0.9
        }));
      });
    }

    function clearVisibilityMask() {
      const existing = document.getElementById("visibilityCutoutMask");
      if (existing) existing.remove();
    }

    function clearHistoryFadeMask() {
      svg.querySelectorAll('[data-history-fade="true"]').forEach((el) => el.remove());
    }

    function visibilityStrokeWidth() {
      return Math.max(18, chartHeight * 0.1);
    }

    function visibilityStrokeAttrs(extra = {}) {
      return {
        d: pathFrom(forecast, "visibility"),
        class: "line",
        "stroke-width": visibilityStrokeWidth(),
        fill: "none",
        filter: "url(#visibilityBlur)",
        ...extra
      };
    }

    function visibilityMaskPoints() {
      return forecast.map((d) => ({ h: d.h, center: y("visibility", d.visibility) }));
    }

    function visibilityCutStrength(distance, strokeWidth) {
      const outerRadius = strokeWidth * 1.02;
      return visibilityIntensity * (1 - smoothStep(0, outerRadius, distance));
    }

    function renderVisibilityMaskField(points) {
      const width = Math.max(1, Math.round(layout.width));
      const height = Math.max(1, Math.round(layout.height));
      const canvas = document.createElement("canvas");
      canvas.width = width;
      canvas.height = height;
      const context = canvas.getContext("2d");
      const image = context.createImageData(width, height);
      image.data.fill(255);

      const strokeWidth = visibilityStrokeWidth();
      const outerRadius = strokeWidth * 1.02;
      const startX = Math.max(0, Math.floor(layout.left));
      const endX = Math.min(width - 1, Math.ceil(layout.left + chartWidth));

      for (let px = startX; px <= endX; px += 1) {
        const hour = clamp(((px + 0.5 - layout.left) / chartWidth) * chartDomainHours(), 0, chartDomainHours());
        const center = interpolateBandValue(points, "center", hour);
        const startY = Math.max(0, Math.floor(center - outerRadius - 1));
        const endY = Math.min(height - 1, Math.ceil(center + outerRadius + 1));

        for (let py = startY; py <= endY; py += 1) {
          const distance = Math.abs(py + 0.5 - center);
          const cut = visibilityCutStrength(distance, strokeWidth);
          const visible = 1 - cut;
          const offset = (py * width + px) * 4;
          image.data[offset + 3] = clamp(Math.round(visible * 255), 0, 255);
        }
      }

      context.putImageData(image, 0, 0);
      return canvas.toDataURL("image/png");
    }

    function createVisibilityCutoutMask() {
      clearVisibilityMask();
      const defs = svg.querySelector("defs");
      const mask = makeEl("mask", {
        id: "visibilityCutoutMask",
        maskUnits: "userSpaceOnUse",
        x: 0,
        y: 0,
        width: layout.width,
        height: layout.height,
        "mask-type": "luminance",
        style: "mask-type: luminance"
      });
      mask.appendChild(makeEl("image", {
        x: 0,
        y: 0,
        width: layout.width,
        height: layout.height,
        href: renderVisibilityMaskField(visibilityMaskPoints()),
        preserveAspectRatio: "none"
      }));
      defs.appendChild(mask);
      return mask.id;
    }

    function hourValueFromTime(time) {
      const text = String(time || "");
      const hour = Number(text.slice(11, 13));
      const minute = Number(text.slice(14, 16));
      if (!Number.isFinite(hour)) return null;
      return clamp(hour + (Number.isFinite(minute) ? minute / 60 : 0), 0, 24);
    }

    function shouldFadeCurrentDayHistory() {
      return selectedDayOffset === 0 && openMeteoCurrentTime && openMeteoReferenceDate && forecast.some((row) => row.date === openMeteoReferenceDate);
    }

    function createHistoryFadeMask() {
      clearHistoryFadeMask();
      if (!shouldFadeCurrentDayHistory()) return "";

      const currentHour = hourValueFromTime(openMeteoCurrentTime);
      if (!Number.isFinite(currentHour) || currentHour <= 0) return "";

      const defs = svg.querySelector("defs");
      const maskId = "currentDayHistoryFadeMask";
      const gradientId = "currentDayHistoryFadeGradient";
      const fadeStartHour = Math.max(0, currentHour - 1);
      const fadeStartX = x(fadeStartHour);
      const currentX = x(currentHour);
      const plotRight = layout.left + chartWidth;
      const mask = makeEl("mask", {
        id: maskId,
        "data-history-fade": "true",
        maskUnits: "userSpaceOnUse",
        x: 0,
        y: 0,
        width: layout.width,
        height: layout.height,
        "mask-type": "luminance",
        style: "mask-type: luminance"
      });

      mask.appendChild(makeEl("rect", {
        x: 0,
        y: 0,
        width: layout.width,
        height: layout.height,
        fill: "white"
      }));

      if (fadeStartX > layout.left) {
        mask.appendChild(makeEl("rect", {
          x: layout.left,
          y: layout.top,
          width: fadeStartX - layout.left,
          height: chartHeight,
          fill: "black",
          opacity: 0.7
        }));
      }

      if (currentX > fadeStartX) {
        const gradient = makeEl("linearGradient", {
          id: gradientId,
          "data-history-fade": "true",
          gradientUnits: "userSpaceOnUse",
          x1: fadeStartX,
          y1: 0,
          x2: currentX,
          y2: 0
        });
        gradient.appendChild(makeEl("stop", { offset: "0%", "stop-color": "black", "stop-opacity": 0.7 }));
        gradient.appendChild(makeEl("stop", { offset: "100%", "stop-color": "black", "stop-opacity": 0 }));
        defs.appendChild(gradient);
        mask.appendChild(makeEl("rect", {
          x: fadeStartX,
          y: layout.top,
          width: Math.min(currentX, plotRight) - fadeStartX,
          height: chartHeight,
          fill: `url(#${gradientId})`
        }));
      }

      defs.appendChild(mask);
      return maskId;
    }

    function drawVisibilityOverlay() {
      const group = seriesGroup("visibility");
      group.appendChild(makeEl("path", visibilityStrokeAttrs({
        stroke: colors.visibility,
        opacity: visibilityIntensity
      })));
    }

    function drawVisibilityMaskIndicator() {
      const group = seriesGroup("visibility");
      group.appendChild(makeEl("path", visibilityStrokeAttrs({
        stroke: colors.visibility,
        opacity: 0
      })));
    }

    function applyVisibilityTreatment(maskedLayer) {
      if (visibilityMode === "mask") {
        const maskId = createVisibilityCutoutMask();
        maskedLayer.setAttribute("mask", `url(#${maskId})`);
        drawVisibilityMaskIndicator();
        return;
      }
      clearVisibilityMask();
      drawVisibilityOverlay();
    }

    function interpolateUvCrossing(prev, next, target) {
      if (next.uv === prev.uv) return { ...next, uv: target };
      const ratio = clamp((target - prev.uv) / (next.uv - prev.uv), 0, 1);
      return {
        ...next,
        h: prev.h + (next.h - prev.h) * ratio,
        uv: target
      };
    }

    function getUvEvents() {
      const uvRows = forecast.filter((d) => Number.isFinite(d.uv));
      if (!uvRows.length) return { peak: null, above: null, below: null };

      const peak = uvRows.reduce((best, d) => d.uv > best.uv ? d : best, uvRows[0]);
      const crossings = [];
      for (let i = 1; i < uvRows.length; i += 1) {
        const prev = uvRows[i - 1];
        const next = uvRows[i];
        if (prev.uv < 3 && next.uv >= 3) {
          crossings.push({ type: "above", data: interpolateUvCrossing(prev, next, 3) });
        }
        if (prev.uv >= 3 && next.uv < 3) {
          crossings.push({ type: "below", data: interpolateUvCrossing(prev, next, 3) });
        }
      }

      const above = crossings.find((crossing) => crossing.type === "above")?.data
        || (uvRows[0].uv >= 3 ? uvRows[0] : null);
      const below = crossings.find((crossing) => crossing.type === "below" && crossing.data.h > peak.h)?.data
        || [...crossings].reverse().find((crossing) => crossing.type === "below")?.data
        || null;
      return { peak, above, below };
    }

    function drawUv() {
      const group = seriesGroup("uv");
      const events = getUvEvents();
      const crossingsAreTight = events.above && events.below && Math.abs(events.below.h - events.above.h) < 2;
      const markers = [
        { type: "above", data: events.above, label: ">", opacity: 0.58 },
        { type: "peak", data: events.peak, label: events.peak ? String(events.peak.uv) : "", opacity: 0.8 },
        { type: "below", data: events.below, label: "<", opacity: 0.58 }
      ].filter((item) => item.data && (!crossingsAreTight || item.type === "peak"));

      markers.forEach((item) => {
        const isCrossing = item.type === "above" || item.type === "below";
        const marker = makeEl("text", {
          x: x(item.data.h),
          y: isCrossing ? layout.top + chartHeight : layout.top + chartHeight + 18,
          class: `axis-label uv-axis-mark${isCrossing ? " uv-axis-crossing" : ""}`,
          "text-anchor": "middle",
          opacity: item.opacity
        });
        marker.textContent = item.label;
        group.appendChild(marker);
      });
    }

    function airQualityLineStyle(key) {
      if (key === "pm2_5") return { width: 2.6, opacity: 0.9, dash: "1 7" };
      if (key === "dust") return { width: 2.4, opacity: 0.72, dash: "7 7" };
      return { width: 2, opacity: 0.58, dash: "4 8" };
    }

    function focusedMetric() {
      return activeMetric || hoverMetric;
    }

    function needsFocusRender(metric) {
      return metric === "rain" || isAirQualityMetric(metric);
    }

    function airQualityOpacity(key, value, maxOpacity) {
      return focusedMetric() === key ? maxOpacity : valueOpacity(key, value, maxOpacity);
    }

    function drawAirQualityMetric(key) {
      const points = forecast.filter((d) => Number.isFinite(d[key]) && d[key] > 0);
      if (!points.length) return;

      const group = seriesGroup(key);
      const style = airQualityLineStyle(key);
      consecutiveRuns(points).forEach((run) => {
        if (run.length > 1) {
          for (let i = 1; i < run.length; i += 1) {
            const prev = run[i - 1];
            const next = run[i];
            const attrs = {
              d: linearPathFromY([prev, next], key, airQualityY),
              class: "line",
              stroke: colors[key],
              "stroke-width": style.width,
              "stroke-opacity": airQualityOpacity(key, (prev[key] + next[key]) / 2, style.opacity)
            };
            if (style.dash) attrs["stroke-dasharray"] = style.dash;
            group.appendChild(makeEl("path", attrs));
          }
        } else {
          group.appendChild(makeEl("circle", {
            cx: x(run[0].h),
            cy: airQualityY(key, run[0][key]),
            r: 3,
            fill: colors[key],
            opacity: airQualityOpacity(key, run[0][key], style.opacity)
          }));
        }
      });
    }

    function comparisonDisplayMetric() {
      const metric = focusedMetric();
      if (isAirQualityMetric(metric) && metricHasVisibleData({ id: metric })) return metric;
      return "";
    }

    function drawAirQualityComparisonLines() {
      const key = comparisonDisplayMetric();
      if (!key) return;
      const comparisons = airQualityComparisons.filter((item) => !item.isCurrent && item.rows?.some((row) => Number.isFinite(row[key]) && row[key] > 0));
      if (!comparisons.length) return;

      const group = makeEl("g", {
        class: "series",
        "data-metric": key,
        "aria-hidden": "true"
      });
      plot.appendChild(group);

      comparisons.forEach((comparison, index) => {
        const points = comparison.rows.filter((row) => Number.isFinite(row[key]) && row[key] > 0);
        const baseOpacity = Math.max(0.06, 0.16 - index * 0.018);
        consecutiveRuns(points).forEach((run) => {
          if (run.length < 2) return;
          for (let i = 1; i < run.length; i += 1) {
            const prev = run[i - 1];
            const next = run[i];
            group.appendChild(makeEl("path", {
              d: linearPathFromY([prev, next], key, airQualityY),
              class: "line",
              stroke: colors[key],
              "stroke-width": key === "pm2_5" ? 1.9 : 1.6,
              "stroke-opacity": airQualityOpacity(key, (prev[key] + next[key]) / 2, baseOpacity),
              "stroke-dasharray": key === "pm2_5" ? "1 7" : "2 8"
            }));
          }
        });
      });
    }

    function drawAirQuality() {
      if (!isWeekView()) drawAirQualityComparisonLines();
      airQualityKeys.forEach((key) => drawAirQualityMetric(key));
    }

    function dataForHour(hour) {
      return forecast.find((d) => d.h === hour) || forecast.reduce((best, d) => Math.abs(d.h - hour) < Math.abs(best.h - hour) ? d : best, forecast[0]);
    }

    function scrubberDotColor(key, value) {
      if (key === "actual" || key === "feels") return tempColor(value);
      if (key === "gust") return colors.wind;
      if (key === "pop") return colors.rain;
      return colors[key] || colors.feels;
    }

    function scrubberDotOpacity(key, value) {
      if (key === "actual") return 0.32;
      if (key === "feels") return 0.72;
      if (key === "humidity") return 0.18 + 0.34 * humidityOpacityMultiplier(value);
      if (key === "gust") return 0.52;
      if (key === "pop") return 0.18 + 0.58 * rainProbabilityOpacity(value);
      if (isAirQualityMetric(key)) {
        const style = airQualityLineStyle(key);
        return clamp(airQualityOpacity(key, value, style.opacity) * 0.85, 0.12, 0.62);
      }
      return 0.55;
    }

    function shouldDrawScrubberDot(key, value) {
      if (!Number.isFinite(value)) return false;
      if (key === "pop") return value > 0;
      if (isAirQualityMetric(key)) return value > 0;
      return true;
    }

    function setScrubberVisible(visible) {
      const changed = scrubberVisible !== visible;
      scrubberVisible = visible;
      const group = document.getElementById("scrubber");
      if (group) group.setAttribute("display", visible ? "inline" : "none");
      if (changed) updateLegendValues();
    }

    function drawScrubber() {
      const data = dataForHour(selectedHour);
      const group = makeEl("g", {
        id: "scrubber",
        "aria-hidden": "true",
        display: scrubberVisible ? "inline" : "none"
      });
      group.appendChild(makeEl("line", {
        id: "scrubberLine",
        class: "scrubber-line",
        x1: x(selectedHour),
        y1: layout.top,
        x2: x(selectedHour),
        y2: layout.top + chartHeight
      }));
      scrubberKeys.forEach((key) => {
        if (!shouldDrawScrubberDot(key, data[key])) return;
        group.appendChild(makeEl("circle", {
          class: "scrubber-dot",
          "data-dot": key,
          cx: x(selectedHour),
          cy: metricY(key, data[key]),
          r: 2.7,
          opacity: scrubberDotOpacity(key, data[key]),
          style: `--dot: ${scrubberDotColor(key, data[key])}`
        }));
      });
      plot.appendChild(group);
    }

    function formatUnit(value, unit, places = 1) {
      return Number.isFinite(value) ? `${round(value, places)} ${unit}` : "n/a";
    }

    function formatConcentration(value) {
      return formatUnit(value, "&micro;g/m&sup3;");
    }

    function formatPollen(value) {
      return formatUnit(value, "𖡼/m&sup3;");
    }

    function averageFinite(rows, key) {
      const values = rows.map((row) => row[key]).filter(Number.isFinite);
      if (!values.length) return null;
      return values.reduce((sum, value) => sum + value, 0) / values.length;
    }

    function maxFiniteValue(rows, key) {
      const point = maxFinitePoint(rows, key);
      return point ? point[key] : null;
    }

    function metricLabel(key) {
      return metricConfig.find((metric) => metric.id === key)?.label || key;
    }

    function peakPollenForRows(rows) {
      return pollenKeys.reduce((best, key) => {
        const point = maxFinitePoint(rows, key);
        if (!point) return best;
        const value = point[key];
        if (!best || value > best.value) {
          return { key, label: metricLabel(key), value, h: point.h };
        }
        return best;
      }, null);
    }

    function dailyAirMetrics(rows) {
      const pm25Avg = averageFinite(rows, "pm2_5");
      const dustAvg = averageFinite(rows, "dust");
      const pollenValues = pollenKeys.reduce((values, key) => ({
        ...values,
        [key]: maxFiniteValue(rows, key)
      }), {});
      return {
        pm2_5: pm25Avg,
        dust: dustAvg,
        ...pollenValues
      };
    }

    function dailyMetricValues(rows, key) {
      const rowsByDate = rows
        .filter((row) => row.h < 24)
        .reduce((groups, row) => {
          if (!groups.has(row.date)) groups.set(row.date, []);
          groups.get(row.date).push(row);
          return groups;
        }, new Map());
      return [...rowsByDate.entries()]
        .map(([date, dayRows]) => ({
          date,
          value: airHistoryMetricValue(dayRows, key)
        }))
        .filter((item) => Number.isFinite(item.value));
    }

    function airRangeMetrics(rows) {
      return airQualityKeys.reduce((metrics, key) => {
        const values = dailyMetricValues(rows, key).map((item) => item.value);
        metrics[key] = values.length
          ? { min: Math.min(...values), max: Math.max(...values) }
          : null;
        return metrics;
      }, {});
    }

    function summarizeAirQualityWindow(year, date, rows, isCurrent = false) {
      const startDate = addDays(date, -29);
      const windowRows = rows.filter((row) => row.date >= startDate && row.date <= date && row.h < 24);
      const dayRows = rows.filter((row) => row.date === date && row.h < 24);
      const metrics = dailyAirMetrics(dayRows);
      return {
        year,
        date,
        startDate,
        isCurrent,
        rows: dayRows,
        windowRows,
        metrics,
        rangeMetrics: airRangeMetrics(windowRows),
        pm25Avg: metrics.pm2_5,
        dustAvg: metrics.dust,
        pollenPeak: peakPollenForRows(dayRows)
      };
    }

    function strongestPollenAt(data) {
      return pollenKeys.reduce((best, key) => {
        const value = data[key];
        if (!Number.isFinite(value)) return best;
        if (!best || value > best.value) return { key, value };
        return best;
      }, null);
    }

    const metricConfig = [
      { id: "temperature", label: "Temp", color: colors.feels, value: (d) => `${d.actual}&deg; / ~${d.feels}&deg;C` },
      { id: "rain", label: "Rain", color: colors.rain, value: (d) => `${d.pop}%, ${d.rain.toFixed(1)} mm` },
      { id: "wind", label: "Wind", color: colors.wind, value: (d) => `${d.wind}-${d.gust} ${windUnitHtml()}` },
      { id: "humidity", label: "Humidity", color: colors.humidity, value: (d) => `${d.humidity}%` },
      { id: "visibility", label: "Visibility", color: colors.visibility, value: (d) => `${d.visibility} km` },
      { id: "uv", label: "UV", color: colors.uv, value: (d) => `${d.uv}` },
